    const mouthY = boss.y + boss.h * 0.34;
    let dx = boss.aimX - mouthX;
    let dy = boss.aimY - mouthY - 12;
    if (Math.abs(dx) + Math.abs(dy) < 1) dx = boss.facing;
    const angle = Math.atan2(dy, dx) + (Math.random() - 0.5) * BOSS_FIRE_JITTER;
    const speed = BOSS_FIRE_SPEED * (0.92 + Math.random() * 0.16);
    bossFireballs.push({
      x: mouthX - 16,
      y: mouthY - 10,
      w: 34,
      h: 22,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      spin: Math.random() * Math.PI * 2,
      life: 172
    });
    playSound("bossFire");
    spawnBurst(mouthX, mouthY, "#fb923c", 8);
  }

  function updateBossFireballs() {
    for (const fire of bossFireballs) {
      fire.x += fire.vx;
      fire.y += fire.vy + Math.sin(fire.spin) * 0.5;
      fire.vy += 0.015;
      fire.spin += 0.26;
      fire.life -= 1;
      if (player.alive && rectsOverlap(player, fire)) {
        fire.life = 0;
        spawnBurst(fire.x + fire.w / 2, fire.y + fire.h / 2, "#f97316", 14);
        hurtPlayer("boss");
      }
    }
    bossFireballs = bossFireballs.filter(fire =>
      fire.life > 0 &&
      fire.x > camX - 260 &&
      fire.x < camX + W + 260 &&
      fire.y > -80 &&
      fire.y < WORLD_H + 80
    );
  }

  function updatePiranhaFireballs() {
    for (const fire of piranhaFireballs) {
      fire.x += fire.vx;
      fire.y += fire.vy;
      fire.vy += 0.018;
      fire.spin += 0.28;
      fire.life -= 1;
      if (player.alive && rectsOverlap(player, fire)) {
        fire.life = 0;
        spawnBurst(fire.x + fire.w / 2, fire.y + fire.h / 2, "#f97316", 12);
        hurtPlayer("piranhaFire");
      }
    }
    piranhaFireballs = piranhaFireballs.filter(fire =>
      fire.life > 0 &&
      fire.x > camX - 260 &&
      fire.x < camX + W + 260 &&
      fire.y > -80 &&
      fire.y < WORLD_H + 90
    );
  }

  function updatePlayerFireballs() {
    for (const fire of playerFireballs) {
      if (!fire.active) continue;
      fire.prevX = fire.x;
      fire.prevY = fire.y;
      fire.life -= 1;
      fire.spin += 0.42;
      fire.vy = Math.min(fire.vy + PLAYER_FIREBALL_GRAVITY, 7.8);
      fire.x += fire.vx;
      fire.y += fire.vy;

      if (fire.life <= 0 || fire.x < camX - 220 || fire.x > camX + W + 220 || fire.y > WORLD_H + 90) {
        fire.active = false;
        continue;
      }

      const enemy = enemies.find(e => e.alive && rectsOverlap(fire, e));
      if (enemy) {
        destroyEnemyWithFire(enemy, fire);
        continue;
      }

      const plant = piranhaPlants.find(p => {
        const hitbox = piranhaPlantHitbox(p);
        return hitbox && rectsOverlap(fire, hitbox);
      });
      if (plant) {
        destroyPiranhaPlantWithFire(plant, fire);
        continue;
      }

      if (boss && boss.alive && rectsOverlap(fire, boss)) {
        damageBossWithFire(fire);
        continue;
      }

      const bossFire = bossFireballs.find(enemyFire => enemyFire.life > 0 && rectsOverlap(fire, enemyFire));
      if (bossFire) {
        bossFire.life = 0;
        fire.active = false;
        spawnBurst(fire.x + fire.w / 2, fire.y + fire.h / 2, "#fb923c", 12);
        continue;
      }

      const piranhaFire = piranhaFireballs.find(enemyFire => enemyFire.life > 0 && rectsOverlap(fire, enemyFire));
      if (piranhaFire) {
        piranhaFire.life = 0;
        fire.active = false;
        spawnBurst(fire.x + fire.w / 2, fire.y + fire.h / 2, "#fb923c", 10);
        continue;
      }

      const hazard = hazards.find(h => rectsOverlap(fire, h));
      if (hazard) {
        destroyHazardWithFire(hazard, fire);
        continue;
      }

      const spring = springs.find(s => rectsOverlap(fire, s));
      if (spring) {
        destroySpringWithFire(spring, fire);
        continue;
      }

      const platform = movingPlatforms.find(p => rectsOverlap(fire, p));
      if (platform) {
        if (platform.kind === "airplane") {
          bounceFireFromRideableAirplane(platform, fire);
        } else {
          destroyMovingPlatformWithFire(platform, fire);
        }
        continue;
      }

      const solid = collisionSolids().find(s => rectsOverlap(fire, s));
      if (!solid) continue;
      if (isFireDestructibleSolid(solid)) {
        destroySolidWithFire(solid, fire);
      } else if (fire.vy > 0 && fire.prevY + fire.h <= solid.y + 8) {
        fire.y = solid.y - fire.h;
        fire.vy = PLAYER_FIREBALL_BOUNCE;
        spawnBurst(fire.x + fire.w / 2, fire.y + fire.h, "#fdba74", 3);
      } else {
        fire.active = false;
      }
    }
    playerFireballs = playerFireballs.filter(fire => fire.active);
    bossFireballs = bossFireballs.filter(fire => fire.life > 0);
    piranhaFireballs = piranhaFireballs.filter(fire => fire.life > 0);
  }

  function destroyEnemyWithFire(enemy, fire) {
    enemy.alive = false;
    enemy.squash = 0;
    fire.active = false;
    score += 200;
    spawnText(enemy.x + enemy.w / 2, enemy.y, "+200", "#fdba74");
    spawnBurst(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, "#fb923c", 16);
    playSound("fireHit");
    updateHud();
  }

  function destroyPiranhaPlantWithFire(plant, fire) {
    fire.active = false;
    piranhaPlants = piranhaPlants.filter(p => p !== plant);
    score += 250;
    spawnText(plant.centerX, plant.mouthY - 44, "+250", "#fdba74");
    spawnBurst(plant.centerX, plant.mouthY - 34, "#fb923c", 18);
    playSound("fireHit");
    updateHud();
  }

  function damageBossWithFire(fire) {
    fire.active = false;
    if (!boss || !boss.alive || boss.hurtTimer > 0) {
      spawnBurst(fire.x + fire.w / 2, fire.y + fire.h / 2, "#fb923c", 8);
      return;
    }
    boss.hp -= 1;
    boss.hurtTimer = 34;
    score += 350;
    playSound("fireHit");
    spawnText(boss.x + boss.w / 2, boss.y + 4, boss.hp > 0 ? "FIRE!" : "BOSS DOWN", boss.hp > 0 ? "#fdba74" : "#facc15");
    spawnBurst(boss.x + boss.w / 2, boss.y + boss.h / 2, boss.hp > 0 ? "#fb923c" : "#facc15", boss.hp > 0 ? 18 : 42);
    if (boss.hp <= 0) {
      boss.alive = false;
      score += 3000;
      bossFireballs = [];
      hideBossHint();
    }
    updateHud();
  }

  function isFireDestructibleSolid(solid) {
    return ["brick", "stone", "question", "questionRare", "hiddenBlock", "pipe", "pipeTop"].includes(solid.type);
  }

  function destroySolidWithFire(solid, fire) {
    const removed = new Set();
    if (solid.type === "pipe" || solid.type === "pipeTop") {
      const pipeX = solid.type === "pipeTop" ? Math.round((solid.x + 8) / TILE) * TILE : solid.x;
      solids = solids.filter(s => {
        const samePipeTile = s.type === "pipe" && Math.abs(s.x - pipeX) < 2;
        const samePipeTop = s.type === "pipeTop" && Math.abs((s.x + 8) - pipeX) < 2;
        if (samePipeTile || samePipeTop) {
          removed.add(s);
          return false;
        }
        return true;
      });
      secretWarps = secretWarps.filter(warp => !removed.has(warp.top) && !removed.has(warp.exitTop));
      piranhaPlants = piranhaPlants.filter(plant => Math.abs(plant.centerX - (pipeX + TILE / 2)) > 2);
    } else {
      removed.add(solid);
      solids = solids.filter(s => s !== solid);
    }
    fire.active = false;
    score += 50;
    spawnText(solid.x + solid.w / 2, solid.y, "BREAK", "#fdba74");
    spawnBurst(solid.x + solid.w / 2, solid.y + solid.h / 2, "#fb923c", 18);
    playSound("fireHit");
    updateHud();
  }

  function destroyHazardWithFire(hazard, fire) {
    hazards = hazards.filter(h => h !== hazard);
    fire.active = false;
    score += 80;
    spawnText(hazard.x + hazard.w / 2, hazard.y, "CLEAR", "#fdba74");
    spawnBurst(hazard.x + hazard.w / 2, hazard.y + hazard.h / 2, "#fb923c", 18);
    playSound("fireHit");
    updateHud();
  }

  function destroySpringWithFire(spring, fire) {
    springs = springs.filter(s => s !== spring);
    fire.active = false;
    score += 40;
    spawnBurst(spring.x + spring.w / 2, spring.y + spring.h / 2, "#fb923c", 12);
    playSound("fireHit");
    updateHud();
  }

  function destroyMovingPlatformWithFire(platform, fire) {
    if (platform.kind === "seesaw" && platform.seesaw) {
      const group = platform.seesaw;
      movingPlatforms = movingPlatforms.filter(p => p.seesaw !== group);
      seesaws = seesaws.filter(seesaw => seesaw !== group);
      if (player.ridingPlatform && player.ridingPlatform.seesaw === group) player.ridingPlatform = null;
    } else {
      movingPlatforms = movingPlatforms.filter(p => p !== platform);
      if (player.ridingPlatform === platform) player.ridingPlatform = null;
    }
    fire.active = false;
    score += 40;
    spawnBurst(platform.x + platform.w / 2, platform.y + platform.h / 2, "#fb923c", 16);
    playSound("fireHit");
    updateHud();
  }

  function bounceFireFromRideableAirplane(platform, fire) {
    if (fire.vy > 0 && fire.prevY + fire.h <= platform.y + 8) {
      fire.y = platform.y - fire.h;
      fire.vy = PLAYER_FIREBALL_BOUNCE;
      spawnBurst(fire.x + fire.w / 2, fire.y + fire.h, "#fde68a", 4);
    } else {
      fire.active = false;
      spawnBurst(fire.x + fire.w / 2, fire.y + fire.h / 2, "#fde68a", 6);
    }
  }

  function updateSecretWarps() {
    if (!player.alive || !(input.down || controller.down)) return;
    for (const warp of secretWarps) {
      if (!playerOnWarpPipe(warp)) continue;
      startSecretWarp(warp);
      return;
    }
  }

  function playerOnWarpPipe(warp) {
    const top = warp.top || warp;
    if (top.pipeDirection === "down") {
      const playerCenterX = player.x + player.w / 2;
      const playerTop = player.y;
      return playerCenterX >= top.x + 4 &&
        playerCenterX <= top.x + top.w - 4 &&
        playerTop <= top.y + top.h + 18 &&
        playerTop >= top.y - TILE * 1.55;
    }
    const footY = player.y + player.h;
    return player.onGround &&
      Math.abs(footY - top.y) <= 5 &&
      playerFootOverlaps(top, 8);
  }

  function startSecretWarp(warp) {
    const fromX = player.x + player.w / 2;
    const fromY = player.y + player.h;
    const entryCenterX = warp.top.x + warp.top.w / 2;
    player.x = clamp(entryCenterX - player.w / 2, 0, worldWidth - player.w);
    player.vx = 0;
    player.vy = 0;
    player.onGround = false;
    player.jumpsUsed = 0;
    player.invuln = Math.max(player.invuln, SECRET_WARP_INVULN_FRAMES);
    player.springSafeTimer = 0;
    if (warp.targetLevelIndex !== null && warp.targetLevelIndex !== undefined) {
      secretWarpAnim = {
        phase: "stageEnter",
        timer: 0,
        warp,
        startX: player.x,
        startY: player.y,
        sinkY: warp.top.pipeDirection === "down"
          ? warp.top.y - player.h - 12
          : warp.top.y + warp.top.h + 12
      };
      spawnBurst(fromX, fromY, "#22c55e", 18);
      playSound("warpEnter");
      spawnText(fromX, player.y - 8, `${warp.targetLabel} SECRET`, "#bbf7d0");
      return;
    }
    secretWarpAnim = {
      phase: "enter",
      timer: 0,
      warp,
      startX: player.x,
      startY: player.y,
      sinkY: warp.top.y + warp.top.h + 12,
      exitX: clamp(warp.exitTop.x + warp.exitTop.w / 2 - player.w / 2, 0, worldWidth - player.w),
      exitStartY: warp.exitBottomY,
      exitReleaseY: warp.exitBottomY + player.h * 0.62
    };
    spawnBurst(fromX, fromY, "#22c55e", 18);
    playSound("warpEnter");
    spawnText(fromX, player.y - 8, "SECRET ROUTE", "#bbf7d0");
  }

  function updateSecretWarpAnimation() {
    const anim = secretWarpAnim;
    if (!anim) return;

    player.prevX = player.x;
    player.prevY = player.y;
    player.vx = 0;
    player.vy = 0;
    player.onGround = false;
    player.invuln = Math.max(player.invuln, SECRET_WARP_INVULN_FRAMES);

    if (anim.phase === "stageEnter") {
      anim.timer++;
      const t = clamp(anim.timer / SECRET_WARP_ENTER_FRAMES, 0, 1);
      const eased = t * t * (3 - 2 * t);
      player.x = anim.startX;
      player.y = anim.startY + (anim.sinkY - anim.startY) * eased;
      if (anim.timer % 5 === 0) {
        spawnBurst(anim.warp.top.x + anim.warp.top.w / 2, anim.warp.top.y + anim.warp.top.h / 2, "#14532d", 3);
      }
      if (t >= 1) enterTargetLevelFromWarp(anim.warp);
      return;
    }

    if (anim.phase === "enter") {
      anim.timer++;
      const t = clamp(anim.timer / SECRET_WARP_ENTER_FRAMES, 0, 1);
      const eased = t * t * (3 - 2 * t);
      player.x = anim.startX;
      player.y = anim.startY + (anim.sinkY - anim.startY) * eased;
      if (anim.timer % 5 === 0) {
        spawnBurst(anim.warp.top.x + anim.warp.top.w / 2, anim.warp.top.y + anim.warp.top.h, "#14532d", 3);
      }
      if (t >= 1) {
        anim.phase = "travel";
        anim.timer = 0;
        player.x = anim.exitX;
        player.y = -player.h - 80;
        player.prevX = player.x;
        player.prevY = player.y;
        camX = clamp(anim.exitX - W * 0.36, 0, worldWidth - W);
      }
      return;
    }

    if (anim.phase === "travel") {
      anim.timer++;
      player.x = anim.exitX;
      player.y = -player.h - 80;
      camX = clamp(anim.exitX - W * 0.36, 0, worldWidth - W);
      if (anim.timer >= SECRET_WARP_TRAVEL_FRAMES) {
        anim.phase = "exit";
        anim.timer = 0;
        player.x = anim.exitX;
        player.y = anim.exitStartY - player.h * 0.85;
        player.prevX = player.x;
        player.prevY = player.y;
        spawnBurst(anim.warp.exitTop.x + anim.warp.exitTop.w / 2, anim.warp.exitTop.y + anim.warp.exitTop.h, "#86efac", 22);
        playSound("warpExit");
      }
      return;
    }

    anim.timer++;
    const t = clamp(anim.timer / SECRET_WARP_EXIT_FRAMES, 0, 1);
    const eased = 1 - Math.pow(1 - t, 3);
    player.x = anim.exitX;
    player.y = anim.exitStartY - player.h * 0.85 + (anim.exitReleaseY - (anim.exitStartY - player.h * 0.85)) * eased;
    if (anim.timer % 6 === 0) {
      spawnBurst(anim.warp.exitTop.x + anim.warp.exitTop.w / 2, player.y + player.h * 0.35, "#bbf7d0", 2);
    }
    if (t >= 1) {
      player.prevX = player.x;
      player.prevY = player.y;
      player.vy = 2.6;
      player.onGround = false;
      player.jumpsUsed = 0;
      secretWarpAnim = null;
      spawnBurst(player.x + player.w / 2, player.y + player.h, "#22c55e", 18);
      spawnText(player.x + player.w / 2, player.y - 8, "BOSS ROUTE", "#fde68a");
    }
  }

  function enterTargetLevelFromWarp(warp) {
    const targetLevelIndex = clamp(warp.targetLevelIndex, 0, LEVELS.length - 1);
    stopStageBgm(true, true);
    currentLevelIndex = targetLevelIndex;
    secretWarpAnim = null;
    buildLevel();
    respawn();
    player.invuln = Math.max(player.invuln, SECRET_WARP_INVULN_FRAMES);
    state = "play";
    setMenuChrome(false);
    hideOverlay();
    hideBossHint();
    hidePowerHint();
    updateHud();
    cueStageBgm(true);
    spawnBurst(player.x + player.w / 2, player.y + player.h * 0.5, "#22c55e", 22);
    spawnText(player.x + player.w / 2, player.y + 16, "SECRET STAGE", "#fde68a");
    playSound("warpExit");
  }

  function updateCoins() {
    for (const c of coins) {
      if (c.taken) continue;
      c.spin += 0.12;
      if (rectsOverlap(player, c)) {
        c.taken = true;
        coinCount += 1;
        coinScore += 100;
        score += 100;
        playSound("coin");
        spawnBurst(c.x + c.w / 2, c.y + c.h / 2, "#facc15", 9);
        updateHud();
      }
    }
  }

  function updateItems() {
    for (const item of items) {
      if (item.collected) continue;
      item.walk += 0.12;

      if (item.emerge > 0) {
        const t = 1 - item.emerge / item.emergeTotal;
        const eased = 1 - Math.pow(1 - t, 3);
        item.y = item.startY + (item.targetY - item.startY) * eased;
        item.emerge -= 1;
        if (item.emerge <= 0) {
          item.y = item.targetY;
          item.vx = item.type === "fly" ? 0.75 : item.type === "companion" ? 0.45 : 1.35;
          item.active = true;
        }
        continue;
      }

      item.vy += item.type === "fly" ? GRAVITY * 0.22 : GRAVITY;
      item.vy = Math.min(item.vy, item.type === "fly" ? 5 : 14);

      item.x += item.vx;
      if (item.x < 0) {
        item.x = 0;
        item.vx = Math.abs(item.vx);
      }
      if (item.x + item.w > worldWidth) {
        item.x = worldWidth - item.w;
        item.vx = -Math.abs(item.vx);
      }
      for (const s of collisionSolids()) {
        if (!rectsOverlap(item, s)) continue;
        if (item.vx > 0) item.x = s.x - item.w;
        else if (item.vx < 0) item.x = s.x + s.w;
        item.vx = -item.vx;
        break;
      }

      item.y += item.vy;
      for (const s of collisionSolids()) {
        if (!rectsOverlap(item, s)) continue;
        if (item.vy > 0) {
          item.y = s.y - item.h;
          item.vy = 0;
        } else if (item.vy < 0) {
          item.y = s.y + s.h;
          item.vy = 0;
        }
      }

      if (item.y > WORLD_H + 120) {
        item.collected = true;
        continue;
      }

      if (item.active && player.alive && rectsOverlap(player, item)) {
        collectItem(item);
      }
    }
    items = items.filter(item => !item.collected || item.emerge > 0);
  }

  function collectItem(item) {
    item.collected = true;
    let label = "+500";
    let color = "#bbf7d0";
    let burstColor = "#22c55e";
    score += 500;

    if (item.type === "grow") {
      activateSuperMario();
      player.invuln = Math.max(player.invuln, 100);
      label = "SUPER";
      color = "#fde68a";
      burstColor = "#facc15";
    } else if (item.type === "tiny") {
      setTinyPlayer();
      player.invuln = Math.max(player.invuln, 120);
      label = "1/2";
      color = "#c4b5fd";
      burstColor = "#a78bfa";
    } else if (item.type === "micro") {
      setMicroPlayer();
      player.invuln = Math.max(player.invuln, 140);
      label = "1/4";
      color = "#f0abfc";
      burstColor = "#e879f9";
    } else if (item.type === "fly") {
      player.flyTimer = Math.max(player.flyTimer, FLY_POWER_TIME);
      player.jumpsUsed = 0;
      label = "FLY";
      color = "#bae6fd";
      burstColor = "#38bdf8";
    } else if (item.type === "companion") {
      player.companion = true;
      player.invuln = Math.max(player.invuln, 120);
      label = "DINO";
      color = "#bbf7d0";
      burstColor = "#22c55e";
    } else {
      const awardedLife = lives < 5;
      if (awardedLife) lives += 1;
      else score += 500;
      player.invuln = Math.max(player.invuln, 120);
      label = awardedLife ? "1UP" : "+1000";
      color = "#bbf7d0";
      burstColor = "#22c55e";
    }

    player.invuln = Math.max(player.invuln, 120);
    playSound("powerup");
    spawnText(item.x + item.w / 2, item.y, label, color);
    spawnBurst(item.x + item.w / 2, item.y + item.h / 2, burstColor, 20);
    updateHud();
  }

  function hurtPlayer(source = "stage") {
    if (player.invuln > 0) return;
    if (source === "boss" && boss && boss.alive) {
      hurtBossPlayer();
      return;
    }
    if (player.companion) {
      player.companion = false;
      player.invuln = 130;
      player.vy = -JUMP_POWER * 0.42;
      playSound("block");
      spawnText(player.x + player.w / 2, player.y, "DINO OUT", "#bbf7d0");
      spawnBurst(player.x + player.w / 2, player.y + player.h, "#22c55e", 18);
      return;
    }
    if (player.sizeMode === "big") {
      deactivateSuperMario();
      player.invuln = 130;
      player.vy = -JUMP_POWER * 0.28;
      playSound("block");
      spawnText(player.x + player.w / 2, player.y, "SMALL", "#fde68a");
      spawnBurst(player.x + player.w / 2, player.y + player.h / 2, "#facc15", 16);
      return;
    }
    die();
  }

  function hurtBossPlayer() {
    player.bossHp = Math.max(0, player.bossHp - 1);
    player.invuln = 110;
    player.vy = -JUMP_POWER * 0.34;
    player.vx = player.x + player.w / 2 < boss.x + boss.w / 2 ? -4.2 : 4.2;
    if (player.bossHp > 0) playSound("block");
    spawnText(player.x + player.w / 2, player.y, `MARIO HP ${player.bossHp}/${PLAYER_BOSS_MAX_HP}`, player.bossHp > 0 ? "#fde68a" : "#fca5a5");
    spawnBurst(player.x + player.w / 2, player.y + player.h / 2, player.bossHp > 0 ? "#facc15" : "#ef4444", player.bossHp > 0 ? 16 : 24);
    if (player.bossHp <= 0) die({ forceTryAgain: true, consumeLife: false });
    else updateHud();
  }

  function updateGoal() {
    if (!flag || !rectsOverlap(player, flag)) return;
    if (boss && boss.alive) {
      player.x = flag.x - player.w - 4;
      player.vx = Math.min(0, player.vx);
      if (boss.warnTimer <= 0) {
        boss.warnTimer = 70;
        spawnText(player.x + player.w / 2, player.y, "DEFEAT BOSS", "#fca5a5");
      }
      return;
    }
    win();
  }

  function die(options = {}) {
    if (!player.alive) return;
    const consumeLife = options.consumeLife !== false;
    const forceTryAgain = Boolean(options.forceTryAgain);
    player.alive = false;
    hideBossHint();
    hidePowerHint();
    deathCount += 1;
    if (consumeLife) lives -= 1;
    retryAvailable = forceTryAgain || lives > 0;
    state = "dead";
    stateTimer = 14;
    player.vy = -10;
    stopStageBgm(true);
    playSound("death");
    spawnBurst(player.x + player.w / 2, player.y + player.h / 2, "#ef4444", 22);
    showOverlay(
      retryAvailable ? "TRY AGAIN - PRESS ANY BUTTON" : "GAME OVER - PRESS ANY BUTTON",
      retryAvailable ? "#fca5a5" : "#f87171",
      { gameOver: true, fromTop: !retryAvailable }
    );
    updateHud();
  }

  function win() {
    if (state !== "play") return;
    score += 1400 + currentLevelIndex * 400;
    spawnBurst(player.x + player.w / 2, player.y, "#facc15", 34);
    stopStageBgm(true, true);
    hideBossHint();
    hidePowerHint();
    notifyOrchestrator("stage-complete");
    const finalClear = currentLevelIndex >= LEVELS.length - 1;
    if (finalClear) {
      state = "finalCourseClear";
      stateTimer = 420;
      finalEndingStarted = false;
      playStageClearMusic({
        onEnded: showFinalClearResult,
        onError: () => { if (state === "finalCourseClear") stateTimer = Math.min(stateTimer, 90); }
      });
      showOverlay("COURSE CLEAR", "#fde68a");
    } else if (GAME_CONFIG.singleStage) {
      state = "win";
      stateTimer = 180;
      playStageClearMusic();
      showOverlay("STAGE COMPLETE - PRESS ANY BUTTON", "#fde68a");
    } else if (currentLevelIndex < LEVELS.length - 1) {
      state = "levelClear";
      stateTimer = 420;
      playStageClearMusic({
        onEnded: advanceAfterStageClear,
        onError: () => { if (state === "levelClear") stateTimer = Math.min(stateTimer, 90); }
      });
      showOverlay("STAGE CLEAR", "#fde68a");
    } else {
      state = "win";
      stateTimer = 180;
      playSound("gameClear");
      showOverlay("ALL CLEAR", "#fde68a");
    }
    updateHud();
  }

  function updateParticles() {
    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      if (!p.text) p.vy += 0.18;
      p.life -= 1;
    }
    particles = particles.filter(p => p.life > 0);
  }

  function updateCamera() {
    const target = player.x - W * 0.38;
    camX += (target - camX) * 0.11;
    camX = clamp(camX, 0, worldWidth - W);
  }

  function updateMovingPlatforms() {
    for (const platform of movingPlatforms) {
      if (platform.kind === "seesaw") continue;
      platform.prevX = platform.x;
      platform.prevY = platform.y;
      if (platform.kind === "airplane") {
        if (!platform.active) {
          platform.dx = 0;
          platform.dy = 0;
          platform.respawnTimer -= 1;
          if (platform.respawnTimer <= 0) {
            launchAirplanePlatform(platform);
          }
          continue;
        }
        if (player.ridingPlatform === platform && player.onGround) {
          platform.rideTimer += 1;
          if (platform.rideTimer >= AIRPLANE_RIDE_DISAPPEAR_FRAMES) {
            vanishAirplanePlatform(platform);
            continue;
          }
        } else {
          platform.rideTimer = Math.max(0, platform.rideTimer - 2);
        }
        const previousOffset = platform.flightOffset || 0;
        platform.flightOffset = positiveModulo(previousOffset + platform.speed, platform.range);
        const wrapped = platform.flightOffset < previousOffset;
        platform.x = platform.flightLeft + platform.flightOffset;
        platform.y = platform.baseY + Math.sin(platform.flightOffset * 0.014 + platform.bobPhase) * 7;
        platform.dx = wrapped ? 0 : platform.x - platform.prevX;
        platform.dy = wrapped ? 0 : platform.y - platform.prevY;
        if (wrapped) {
          if (player.ridingPlatform === platform) {
            player.ridingPlatform = null;
            player.onGround = false;
          }
          parkAirplanePlatform(platform, AIRPLANE_RESPAWN_FRAMES);
          continue;
        }
        movePlayerWithPlatform(platform);
        continue;
      }
      platform.phase += platform.speed;
      const offset = Math.sin(platform.phase) * platform.range;
      if (platform.axis === "x") {
        platform.x = platform.baseX + offset;
        platform.y = platform.baseY;
      } else {
        platform.x = platform.baseX;
        platform.y = platform.baseY + offset;
      }
      platform.dx = platform.x - platform.prevX;
      platform.dy = platform.y - platform.prevY;
      movePlayerWithPlatform(platform);
    }
    for (const seesaw of seesaws) updateSeesaw(seesaw);
  }

  function parkAirplanePlatform(platform, delay = AIRPLANE_RESPAWN_FRAMES) {
    platform.active = false;
    platform.respawnTimer = delay;
    platform.rideTimer = 0;
    platform.flightOffset = 0;
    platform.dx = 0;
    platform.dy = 0;
    platform.x = platform.flightLeft - platform.w - AIRPLANE_OFFSCREEN_RESET_MARGIN;
    platform.y = platform.baseY;
    platform.prevX = platform.x;
    platform.prevY = platform.y;
  }

  function launchAirplanePlatform(platform) {
    const viewportEntryX = camX - platform.w - AIRPLANE_OFFSCREEN_RESET_MARGIN;
    const maxOffset = Math.max(0, platform.range - platform.w - TILE * 2);
    const startOffset = clamp(Math.max(0, viewportEntryX - platform.flightLeft), 0, maxOffset);
    platform.active = true;
    platform.respawnTimer = 0;
    platform.rideTimer = 0;
    platform.flightOffset = startOffset;
    platform.x = platform.flightLeft + startOffset;
    platform.y = platform.baseY;
    platform.prevX = platform.x;
    platform.prevY = platform.y;
    platform.dx = 0;
    platform.dy = 0;
  }

  function vanishAirplanePlatform(platform) {
    if (player.ridingPlatform === platform) {
      player.ridingPlatform = null;
      player.onGround = false;
      player.vy = Math.min(player.vy, 0);
    }
    spawnBurst(platform.x + platform.w / 2, platform.y + platform.h / 2, "#d8f0ff", 12);
    spawnText(platform.x + platform.w / 2, platform.y - 6, "PASS", "#d8f0ff");
    parkAirplanePlatform(platform, AIRPLANE_RESPAWN_FRAMES);
  }

  function updateSeesaw(seesaw) {
    const riderSide = player.alive &&
      player.onGround &&
      player.ridingPlatform &&
      player.ridingPlatform.seesaw === seesaw
      ? player.ridingPlatform.side
      : 0;
    const targetOffset = riderSide < 0
      ? seesaw.range
      : riderSide > 0
        ? -seesaw.range
        : 0;

    seesaw.left.prevX = seesaw.left.x;
    seesaw.left.prevY = seesaw.left.y;
    seesaw.right.prevX = seesaw.right.x;
    seesaw.right.prevY = seesaw.right.y;

    seesaw.velocity += (targetOffset - seesaw.offset) * seesaw.spring;
    seesaw.velocity *= seesaw.friction;
    seesaw.offset = clamp(seesaw.offset + seesaw.velocity, -seesaw.range, seesaw.range);

    seesaw.left.x = seesaw.left.baseX;
    seesaw.right.x = seesaw.right.baseX;
    seesaw.left.y = seesaw.left.baseY + seesaw.offset;
    seesaw.right.y = seesaw.right.baseY - seesaw.offset;
    seesaw.left.dx = seesaw.left.x - seesaw.left.prevX;
    seesaw.left.dy = seesaw.left.y - seesaw.left.prevY;
    seesaw.right.dx = seesaw.right.x - seesaw.right.prevX;
    seesaw.right.dy = seesaw.right.y - seesaw.right.prevY;

    movePlayerWithPlatform(seesaw.left);
    movePlayerWithPlatform(seesaw.right);
  }

  function updateSprings() {
    for (const spring of springs) {
      if (spring.cooldown > 0) spring.cooldown--;
      spring.anim *= 0.82;

      if (!player.alive || !rectsOverlap(player, spring)) continue;
      resolveSpringContact(spring);
    }
  }

  function resolveSpringContact(spring) {
    const bounce = playerLandsOn(spring, SPRING_STOMP_TOP_BAND, SPRING_STOMP_SIDE_FORGIVENESS);
    if (bounce && spring.cooldown <= 0) {
      bounceOnSpring(spring);
      return;
    }

    const prevLeft = player.prevX;
    const prevRight = player.prevX + player.w;
    const prevTop = player.prevY;
    const prevBottom = player.prevY + player.h;

    if (prevRight <= spring.x + 2) {
      player.x = spring.x - player.w;
      player.vx = 0;
      return;
    }
    if (prevLeft >= spring.x + spring.w - 2) {
      player.x = spring.x + spring.w;
      player.vx = 0;
      return;
    }
    if (prevBottom <= spring.y + 2) {
      if (spring.cooldown <= 0) bounceOnSpring(spring);
      else {
        player.y = spring.y - player.h;
        player.vy = 0;
        player.onGround = true;
        player.jumpsUsed = 0;
      }
      return;
    }
    if (prevTop >= spring.y + spring.h - 2) {
      player.y = spring.y + spring.h;
      if (player.vy < 0) player.vy = 0;
      return;
    }

    if (player.x + player.w / 2 < spring.x + spring.w / 2) {
      player.x = spring.x - player.w;
    } else {
      player.x = spring.x + spring.w;
    }
    player.vx = 0;
  }

  function bounceOnSpring(spring) {
    player.y = spring.y - player.h;
    player.vy = -17.2;
    player.onGround = false;
    player.jumpsUsed = 0;
    player.springSafeTimer = SPRING_HAZARD_GRACE_FRAMES;
    spring.cooldown = 22;
    spring.anim = 1;
    playSound("spring");
    spawnBurst(spring.x + spring.w / 2, spring.y, "#bae6fd", 14);
  }

  function updateHazards() {
    for (const hazard of hazards) {
      hazard.anim += 0.08;
      if (!player.alive || player.springSafeTimer > 0 || !rectsOverlap(player, hazard)) continue;
      if (hazard.type === "lava" && !playerDropsIntoLava(hazard)) continue;
      hurtPlayer();
      break;
    }
  }

  function spawnBurst(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 1 + Math.random() * 4;
      particles.push({
        x, y,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s - 1.8,
        r: 2 + Math.random() * 4,
        color,
        life: 24 + Math.random() * 22
      });
    }
  }

  function spawnText(x, y, text, color) {
    particles.push({ x, y, vx: 0, vy: -1.15, color, text, life: 54 });
  }

  function draw() {
    ctx.imageSmoothingEnabled = !RETRO_8BIT_MODE;
    ctx.clearRect(0, 0, W, H);
    if (state === "ready") {
      drawMainMenuScreen();
      return;
    }
    drawBackground();

    ctx.save();
    ctx.translate(-Math.floor(camX), 0);

    for (const plant of piranhaPlants) drawPiranhaPlant(plant);
    for (const s of solids) drawSolid(s);
    for (const seesaw of seesaws) drawSeesawRigging(seesaw);
    for (const platform of movingPlatforms) drawMovingPlatform(platform);
    for (const spring of springs) drawSpring(spring);
    for (const hazard of hazards) drawHazard(hazard);
    drawFlag();
    for (const c of coins) if (!c.taken) drawCoin(c);
    for (const item of items) drawItem(item);
    for (const fire of playerFireballs) drawPlayerFireball(fire);
    for (const e of enemies) drawEnemy(e);
    drawBoss();
    for (const fire of bossFireballs) drawBossFireball(fire);
    for (const fire of piranhaFireballs) drawPiranhaFireball(fire);
    if ((player.alive || state === "dead") && !isPlayerHiddenByWarp()) drawPlayer();
    drawBossPlayerHpText();
    for (const p of particles) drawParticle(p);

    ctx.restore();
    drawVignette();
  }

  }

  function drawMountain(x, base, width, body, snow) {
    ctx.fillStyle = body;
    ctx.beginPath();
    ctx.moveTo(x, base);
    ctx.lineTo(x + width * 0.48, base - width * 0.56);
    ctx.lineTo(x + width, base);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = snow;
    ctx.beginPath();
    ctx.moveTo(x + width * 0.38, base - width * 0.44);
    ctx.lineTo(x + width * 0.48, base - width * 0.56);
    ctx.lineTo(x + width * 0.63, base - width * 0.38);
    ctx.lineTo(x + width * 0.54, base - width * 0.42);
    ctx.lineTo(x + width * 0.46, base - width * 0.34);

  function drawSolid(s) {
    if (s.type === "hiddenBlock" && !s.revealed) {
      return;
    }
    if (s.type === "deep") {
      drawEarth(s, false);
      return;
    }
    if (s.type === "ground") {
      drawEarth(s, true);
      return;
    }
    if (s.type === "brick") {
      drawBrick(s);
      return;
    }
    if (s.type === "hardBrick") {
      drawHardBrick(s);
      return;
    }
    if (s.type === "stone") {
      drawStone(s);
      return;
    }
    if (s.type === "skyPerch") {
      drawSkyPerch(s);
      return;
    }
    if (s.type === "pipe" || s.type === "pipeTop") {
      drawPipe(s);
      return;
    }
    drawQuestion(s);
  }

  function drawEarth(s, top) {
    if (RETRO_8BIT_MODE) {
      drawRetroEarth(s, top);
      return;
    }
    const g = ctx.createLinearGradient(0, s.y, 0, s.y + s.h);
    if (top) {
      g.addColorStop(0, "#5f8f38");
      g.addColorStop(0.18, "#3f6f2e");
      g.addColorStop(0.19, "#9b6034");
      g.addColorStop(1, "#51311f");
    } else {
      g.addColorStop(0, "#7b4b2d");
      g.addColorStop(1, "#3c2418");
    }
    ctx.fillStyle = g;
    roundRect(s.x, s.y, s.w, s.h, 2);
    ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.12)";
    for (let i = 0; i < 4; i++) ctx.fillRect(s.x + 7 + i * 9, s.y + 12 + ((s.x / TILE + i) % 2) * 12, 4, 2);
  }

  function drawBrick(s) {
    if (RETRO_8BIT_MODE) {
      drawRetroBrick(s);
      return;
    }
    const g = ctx.createLinearGradient(0, s.y, 0, s.y + s.h);
    g.addColorStop(0, "#b85c38");
    g.addColorStop(1, "#6b2f1e");
    ctx.fillStyle = g;
    roundRect(s.x + 1, s.y + 1, s.w - 2, s.h - 2, 4);
    ctx.fill();
    ctx.strokeStyle = "rgba(30, 20, 15, 0.55)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(s.x + 4, s.y + s.h / 2);
    ctx.lineTo(s.x + s.w - 4, s.y + s.h / 2);
    ctx.moveTo(s.x + s.w / 2, s.y + 3);
    ctx.lineTo(s.x + s.w / 2, s.y + s.h / 2);
    ctx.moveTo(s.x + s.w * 0.28, s.y + s.h / 2);
    ctx.lineTo(s.x + s.w * 0.28, s.y + s.h - 4);
    ctx.moveTo(s.x + s.w * 0.74, s.y + s.h / 2);
    ctx.lineTo(s.x + s.w * 0.74, s.y + s.h - 4);
    ctx.stroke();

    if (s.breakHits > 0) {
      ctx.strokeStyle = "rgba(255, 237, 213, 0.82)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(s.x + 10, s.y + 8);
      ctx.lineTo(s.x + 18, s.y + 18);
      ctx.lineTo(s.x + 13, s.y + 27);
      ctx.moveTo(s.x + 27, s.y + 10);
      ctx.lineTo(s.x + 21, s.y + 20);
      ctx.lineTo(s.x + 30, s.y + 32);
      ctx.stroke();
    }
  }

  function drawHardBrick(s) {
    if (RETRO_8BIT_MODE) {
      drawRetroHardBrick(s);
      return;
    }
    const g = ctx.createLinearGradient(0, s.y, 0, s.y + s.h);
    g.addColorStop(0, "#7c3f1f");
    g.addColorStop(0.42, "#5b2a14");
    g.addColorStop(1, "#2f160b");
    ctx.fillStyle = g;
    roundRect(s.x + 1, s.y + 1, s.w - 2, s.h - 2, 4);
    ctx.fill();
    ctx.strokeStyle = "rgba(255, 214, 165, 0.38)";
    ctx.lineWidth = 2;
    ctx.strokeRect(s.x + 6, s.y + 6, s.w - 12, s.h - 12);
    ctx.fillStyle = "rgba(255, 214, 165, 0.55)";
    ctx.fillRect(s.x + 8, s.y + 8, 5, 5);
    ctx.fillRect(s.x + s.w - 13, s.y + 8, 5, 5);
    ctx.fillStyle = "rgba(0, 0, 0, 0.34)";
    ctx.fillRect(s.x + 9, s.y + s.h - 12, s.w - 18, 4);
  }

  function drawStone(s) {
    if (RETRO_8BIT_MODE) {
      drawRetroStone(s);
      return;
    }
    const g = ctx.createLinearGradient(0, s.y, 0, s.y + s.h);
    g.addColorStop(0, "#9ca3af");
    g.addColorStop(1, "#4b5563");
    ctx.fillStyle = g;
    roundRect(s.x + 1, s.y + 1, s.w - 2, s.h - 2, 5);
    ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.16)";
    ctx.beginPath();
    ctx.ellipse(s.x + 14, s.y + 12, 12, 4, -0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "rgba(17,24,39,0.36)";
    ctx.lineWidth = 1.5;
    ctx.strokeRect(s.x + 4, s.y + 4, s.w - 8, s.h - 8);
  }

  function drawSkyPerch(s) {
    if (RETRO_8BIT_MODE) {
      drawRetroSkyPerch(s);
      return;
    }
    const stemW = Math.min(52, s.w * 0.34);
    const stemX = s.x + s.w / 2 - stemW / 2;
    const stemY = s.y + s.h;
    const stemH = s.stemHeight || 150;
    const stem = ctx.createLinearGradient(stemX, 0, stemX + stemW, 0);
    stem.addColorStop(0, "#d7a08c");
    stem.addColorStop(0.5, "#ffe5d6");
    stem.addColorStop(1, "#b87968");
    ctx.fillStyle = stem;
    roundRect(stemX, stemY - 1, stemW, stemH, 3);
    ctx.fill();
    ctx.strokeStyle = "rgba(53, 17, 4, 0.72)";
    ctx.lineWidth = 2;
    ctx.stroke();

    const cap = ctx.createLinearGradient(0, s.y, 0, s.y + s.h);
    cap.addColorStop(0, "#ffe08a");
    cap.addColorStop(0.55, "#d8a030");
    cap.addColorStop(1, "#8a2d0a");
    ctx.fillStyle = cap;
    roundRect(s.x, s.y - 5, s.w, s.h + 6, 5);
    ctx.fill();
    ctx.strokeStyle = "rgba(53, 17, 4, 0.86)";
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = "#8a2d0a";
    for (let x = s.x + 18; x < s.x + s.w - 12; x += 38) {
      ctx.beginPath();
      ctx.ellipse(x, s.y + 11, 9, 7, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawQuestion(s) {
    if (RETRO_8BIT_MODE) {
      drawRetroQuestion(s);
      return;
    }
    const rare = s.rareBox || s.type === "questionRare";
    if (sprites.crate) {
      ctx.drawImage(sprites.crate, s.x - 4, s.y - 6, s.w + 8, s.h + 8);
      if (rare && !s.used) {
        ctx.strokeStyle = "#f0abfc";
        ctx.lineWidth = 3;
        ctx.strokeRect(s.x - 3, s.y - 3, s.w + 6, s.h + 6);
      }
      if (s.used) {
        ctx.fillStyle = "rgba(17,24,39,0.45)";
        ctx.fillRect(s.x, s.y, s.w, s.h);
      }
      return;
    }
    const g = ctx.createLinearGradient(0, s.y, 0, s.y + s.h);
    g.addColorStop(0, s.used ? "#8b6f47" : rare ? "#fde68a" : "#fcd34d");
    g.addColorStop(1, s.used ? "#4b3827" : rare ? "#c026d3" : "#c87917");
    ctx.fillStyle = g;
    roundRect(s.x + 1, s.y + 1, s.w - 2, s.h - 2, 6);
    ctx.fill();
    ctx.strokeStyle = "rgba(77, 43, 7, 0.55)";
    ctx.lineWidth = 2;
    ctx.stroke();
    if (!s.used) {
      ctx.fillStyle = "#fff7ed";
      ctx.font = "900 25px Segoe UI";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(rare ? "!" : "?", s.x + s.w / 2, s.y + s.h / 2 + 1);
      if (rare) {
        ctx.strokeStyle = "#f0abfc";
        ctx.lineWidth = 3;
        ctx.strokeRect(s.x - 3, s.y - 3, s.w + 6, s.h + 6);
      }
    }
  }

  function drawPipe(s) {
    if (RETRO_8BIT_MODE) {
      drawRetroPipe(s);
      return;
    }
    const g = ctx.createLinearGradient(s.x, 0, s.x + s.w, 0);
    g.addColorStop(0, "#063f2b");
    g.addColorStop(0.13, "#0e6b42");
    g.addColorStop(0.34, "#22b264");
    g.addColorStop(0.52, "#82e6a0");
    g.addColorStop(0.7, "#17854e");
    g.addColorStop(1, "#052b20");
    ctx.fillStyle = g;
    roundRect(s.x, s.y, s.w, s.h, s.type === "pipeTop" ? 8 : 2);
    ctx.fill();
    ctx.strokeStyle = "rgba(6, 24, 18, 0.75)";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = "rgba(255,255,255,0.34)";
    ctx.fillRect(s.x + s.w * 0.35, s.y + 4, 4, s.h - 8);
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(s.x + s.w - 8, s.y + 3, 5, s.h - 6);

    if (s.type === "pipeTop") {
      const lip = ctx.createLinearGradient(0, s.y, 0, s.y + s.h);
      lip.addColorStop(0, "#8ef2ac");
      lip.addColorStop(0.45, "#20a65c");
      lip.addColorStop(1, "#07442f");
      ctx.fillStyle = lip;
      roundRect(s.x - 1, s.y - 2, s.w + 2, s.h + 4, 9);
      ctx.fill();
      ctx.strokeStyle = "rgba(5, 22, 16, 0.78)";
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = "rgba(3, 31, 22, 0.28)";
      roundRect(s.x + 6, s.y + 6, s.w - 12, 5, 3);
      ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.28)";
      ctx.fillRect(s.x + 9, s.y + 3, s.w * 0.34, 3);
      if (s.secretWarp) {
        ctx.fillStyle = "rgba(2, 12, 8, 0.55)";
        const mouthY = s.pipeDirection === "down" ? s.y + s.h - 8 : s.y + 9;
        roundRect(s.x + 9, mouthY, s.w - 18, 5, 3);
        ctx.fill();
      }
    } else {
      ctx.fillStyle = "rgba(3, 31, 22, 0.16)";
      ctx.fillRect(s.x + 3, s.y + s.h - 7, s.w - 6, 3);
      ctx.fillStyle = "rgba(187, 247, 208, 0.2)";
      ctx.beginPath();
      ctx.arc(s.x + 10, s.y + 10, 2, 0, Math.PI * 2);
      ctx.arc(s.x + s.w - 10, s.y + 10, 2, 0, Math.PI * 2);
      ctx.fill();
      if (s.exitPipeMouth) {
        ctx.fillStyle = "rgba(2, 12, 8, 0.62)";
        roundRect(s.x + 5, s.y + s.h - 8, s.w - 10, 7, 3);
        ctx.fill();
      }
    }
  }

  function drawPiranhaPlant(plant) {
    const progress = piranhaPlantProgress(plant);
    if (progress <= 0.02) return;

    const x = plant.centerX - plant.w / 2;
    const y = piranhaPlantTop(plant, progress);
    const pose = piranhaPlantPose(plant);
    const fireVariant = plant.variant === "fire";
    const sprite = fireVariant
      ? (pose === "open" ? sprites.firePiranhaOpen : sprites.firePiranhaClosed)
      : (pose === "open" ? sprites.piranhaPlantOpen : sprites.piranhaPlantClosed);
    const smoothing = ctx.imageSmoothingEnabled;

    ctx.save();
    ctx.imageSmoothingEnabled = false;
    ctx.beginPath();
    ctx.rect(x - 8, plant.mouthY - plant.h - 8, plant.w + 16, plant.h + plant.recess + 18);
    ctx.clip();

    ctx.fillStyle = "rgba(0, 0, 0, 0.24)";
    ctx.fillRect(plant.centerX - 16, plant.mouthY - 2, 32, 8);

    if (sprite && sprite.complete && (sprite.naturalWidth || sprite.width)) {
      if (fireVariant && plant.facing > 0) {
        ctx.save();
        ctx.translate(Math.round(x + plant.w), Math.round(y));
        ctx.scale(-1, 1);
        ctx.drawImage(sprite, 0, 0, plant.w, plant.h);
        ctx.restore();
      } else {
        ctx.drawImage(sprite, Math.round(x), Math.round(y), plant.w, plant.h);
      }
    } else {
      drawFallbackPiranhaPlant(x, y, plant.w, plant.h, pose, fireVariant);
    }

    ctx.restore();
    ctx.imageSmoothingEnabled = smoothing;
  }

  function drawFallbackPiranhaPlant(x, y, w, h, pose = "open", fireVariant = false) {
    const p = retroPalette();
    const sx = w / 64;
    const sy = h / 88;
    ctx.save();
    ctx.translate(Math.round(x), Math.round(y));
    ctx.scale(sx, sy);

    const stem = fireVariant ? "#1f8f2f" : "#ff8c20";
    const stemLight = fireVariant ? "#3fbd48" : "#ffb34a";
    const head = fireVariant ? "#7e3212" : "#009000";
    const headLight = fireVariant ? "#c45b19" : "#00a000";
    retroRect(29, 43, 7, 42, stem);
    retroRect(35, 43, 7, 42, stemLight);
    retroRect(11, 58, 10, 7, stem);
    retroRect(18, 65, 8, 7, p.pipe);
    retroRect(44, 65, 8, 7, p.pipe);
    retroRect(51, 58, 10, 7, stem);

    if (pose === "closed") {
      retroRect(22, 4, 11, 44, head);
      retroRect(31, 0, 11, 50, headLight);
      retroRect(40, 4, 11, 44, head);
      retroRect(18, 18, 10, 22, head);
      retroRect(46, 18, 10, 22, head);
      retroRect(32, 14, 4, 28, "#ffffff");
      retroRect(38, 14, 4, 28, "#ffffff");
      retroRect(25, 15, 5, 5, "#ff8c20");
      retroRect(43, 15, 5, 5, "#ff8c20");
      retroRect(25, 30, 5, 5, "#ff8c20");
      retroRect(43, 30, 5, 5, "#ff8c20");
    } else {
      retroRect(8, 16, 19, 28, head);
      retroRect(6, 26, 14, 24, head);
      retroRect(17, 6, 8, 15, headLight);
      retroRect(39, 16, 19, 28, head);
      retroRect(51, 26, 14, 24, head);
      retroRect(45, 6, 8, 15, headLight);
      retroRect(24, 42, 18, 8, head);

      retroRect(22, 20, 5, 5, "#ff8c20");
      retroRect(11, 31, 5, 5, "#ff8c20");
      retroRect(22, 40, 5, 5, "#ff8c20");
      retroRect(40, 20, 5, 5, "#ff8c20");
      retroRect(52, 31, 5, 5, "#ff8c20");
      retroRect(41, 40, 5, 5, "#ff8c20");

      retroRect(28, 26, 8, 7, "#ffffff");
      retroRect(34, 26, 8, 7, "#ffffff");
    }
    ctx.restore();
  }

  function drawMovingPlatform(platform) {
    if (platform.kind === "airplane" && !platform.active) return;
    if (RETRO_8BIT_MODE) {
      drawRetroMovingPlatform(platform);
      return;
    }
    if (platform.kind === "airplane") {
      drawAirplanePlatform(platform);
      return;
    }
    if (platform.kind === "seesaw") {
      drawSeesawPlatformBody(platform);
      return;
    }
    const g = ctx.createLinearGradient(0, platform.y, 0, platform.y + platform.h);
    g.addColorStop(0, "#d6b37a");
    g.addColorStop(0.45, "#9b6a36");
    g.addColorStop(1, "#4f2f1a");
    ctx.fillStyle = g;
    roundRect(platform.x, platform.y, platform.w, platform.h, 5);
    ctx.fill();
    ctx.strokeStyle = "rgba(40, 25, 13, 0.65)";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = "rgba(255,255,255,0.22)";
    ctx.fillRect(platform.x + 8, platform.y + 4, platform.w - 16, 3);
    ctx.fillStyle = "rgba(15,23,42,0.22)";
    for (let x = platform.x + 14; x < platform.x + platform.w - 8; x += 28) {
      ctx.beginPath();
      ctx.arc(x, platform.y + platform.h / 2 + 1, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawAirplanePlatform(platform) {
    const sprite = sprites.zeroFighterSide;
    if (sprite && sprite.complete && (sprite.naturalWidth || sprite.width)) {
      drawZeroFighterSprite(platform, sprite);
      return;
    }
    ctx.save();
    const x = platform.x;
    const y = platform.y;
    const w = platform.w;
    const h = platform.h;
    ctx.fillStyle = "#f8fafc";
    roundRect(x + 18, y + 6, w - 44, h - 2, 10);
    ctx.fill();
    ctx.fillStyle = "#dbeafe";
    ctx.fillRect(x + w * 0.35, y + h - 2, w * 0.34, 18);
    ctx.fillStyle = "#ef4444";
    ctx.fillRect(x + w - 30, y - 7, 16, 16);
    ctx.fillRect(x + w - 20, y + 5, 22, 7);
    ctx.fillStyle = "#38bdf8";
    for (let px = x + 44; px < x + w - 50; px += 22) {
      ctx.beginPath();
      ctx.arc(px, y + 12, 4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.strokeStyle = "rgba(15, 23, 42, 0.72)";
    ctx.lineWidth = 2;
    ctx.strokeRect(x + 24, y + 1, w - 58, 5);
    ctx.restore();
  }

  function drawZeroFighterSprite(platform, sprite) {
    const imgW = sprite.naturalWidth || sprite.width;
    const imgH = sprite.naturalHeight || sprite.height;
    const drawW = platform.w;
    const drawH = drawW * (imgH / imgW);
    const drawX = Math.round(platform.x - 4);
    const drawY = Math.round(platform.y - drawH * 0.22);
    const smoothing = ctx.imageSmoothingEnabled;
    ctx.save();
    ctx.imageSmoothingEnabled = false;
    ctx.translate(drawX + drawW, drawY);
    ctx.scale(-1, 1);
    ctx.drawImage(sprite, 0, 0, drawW, drawH);
    ctx.restore();
    ctx.imageSmoothingEnabled = smoothing;
  }

  function drawSeesawRigging(seesaw) {
    if (RETRO_8BIT_MODE) {
      drawRetroSeesawRigging(seesaw);
      return;
    }
    const left = seesaw.left;
    const right = seesaw.right;
    const leftCx = left.x + left.w / 2;
    const rightCx = right.x + right.w / 2;
    const topY = seesaw.topY;
    ctx.save();
    ctx.strokeStyle = "rgba(255, 219, 170, 0.86)";
    ctx.lineWidth = 5;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(leftCx, topY);
    ctx.lineTo(rightCx, topY);
    ctx.moveTo(leftCx, topY);
    ctx.lineTo(leftCx, left.y + 1);
    ctx.moveTo(rightCx, topY);
    ctx.lineTo(rightCx, right.y + 1);
    ctx.stroke();
    ctx.fillStyle = "#8a4b16";
    for (const cx of [leftCx, rightCx]) {
      ctx.beginPath();
      ctx.arc(cx, topY, 12, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawSeesawPlatformBody(platform) {
    const g = ctx.createLinearGradient(0, platform.y, 0, platform.y + platform.h);
    g.addColorStop(0, "#ffe08a");
    g.addColorStop(0.5, "#cf7a18");
    g.addColorStop(1, "#7c2d12");
    ctx.fillStyle = g;
    roundRect(platform.x, platform.y, platform.w, platform.h, 4);
    ctx.fill();
    ctx.strokeStyle = "rgba(53, 17, 4, 0.72)";
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = "rgba(255,255,255,0.28)";
    ctx.fillRect(platform.x + 8, platform.y + 4, platform.w - 16, 3);
    ctx.fillStyle = "rgba(15,23,42,0.32)";
    for (let x = platform.x + 18; x < platform.x + platform.w - 8; x += 28) {
      ctx.beginPath();
      ctx.arc(x, platform.y + platform.h / 2 + 1, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawSpring(spring) {
    if (RETRO_8BIT_MODE) {
      drawRetroSpring(spring);
      return;
    }
    const compression = spring.anim * 7;
    const topY = spring.y + compression;
    ctx.fillStyle = "rgba(0,0,0,0.22)";
    ctx.beginPath();
    ctx.ellipse(spring.x + spring.w / 2, spring.y + spring.h + 3, spring.w / 2, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    const metal = ctx.createLinearGradient(0, spring.y, 0, spring.y + spring.h);
    metal.addColorStop(0, "#e5e7eb");
    metal.addColorStop(1, "#64748b");
    ctx.strokeStyle = metal;
    ctx.lineWidth = 4;
    ctx.beginPath();
    for (let i = 0; i <= 5; i++) {
      const x = spring.x + 4 + (i % 2) * (spring.w - 8);
      const y = topY + 4 + i * ((spring.h - compression - 8) / 5);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();

    ctx.fillStyle = "#ef4444";
    roundRect(spring.x, topY - 4, spring.w, 7, 4);
    ctx.fill();
    ctx.fillStyle = "#1f2937";
    roundRect(spring.x + 2, spring.y + spring.h - 4, spring.w - 4, 6, 3);
    ctx.fill();
  }

  function drawMagmaHazard(hazard) {
    const topY = hazard.y - 7;
    const visualH = hazard.h + 9;
    const right = hazard.x + hazard.w;
    const magma = sprites.magmaLoop;
    const smoothing = ctx.imageSmoothingEnabled;

    ctx.save();
    ctx.imageSmoothingEnabled = true;

    ctx.shadowColor = "rgba(255, 88, 10, 0.68)";
    ctx.shadowBlur = 18;
    ctx.fillStyle = "rgba(242, 70, 8, 0.78)";
    roundRect(hazard.x - 1, topY, hazard.w + 2, visualH + 1, 5);
    ctx.fill();
    ctx.shadowBlur = 0;

    roundRect(hazard.x, topY, hazard.w, visualH, 5);
    ctx.clip();

    if (magma && magma.complete && (magma.naturalWidth || magma.width)) {
      const imageW = magma.naturalWidth || magma.width;
      const imageH = magma.naturalHeight || magma.height || 1;
      const tileW = Math.max(120, imageW * (visualH / imageH));
      const scroll = positiveModulo(hazard.anim * 16, tileW);
      for (let x = hazard.x - scroll; x < right + tileW; x += tileW) {
        ctx.drawImage(magma, x, topY, tileW, visualH);
      }
    } else {
      drawProceduralMagmaFill(hazard, topY, visualH);
    }

    const depth = ctx.createLinearGradient(0, topY, 0, topY + visualH);
    depth.addColorStop(0, "rgba(255, 249, 198, 0.20)");
    depth.addColorStop(0.26, "rgba(255, 120, 20, 0.10)");
    depth.addColorStop(0.72, "rgba(73, 12, 3, 0.15)");
    depth.addColorStop(1, "rgba(9, 3, 2, 0.42)");
    ctx.fillStyle = depth;
    ctx.fillRect(hazard.x, topY, hazard.w, visualH);

    drawMagmaSurface(hazard, topY, visualH);
    drawMagmaCrust(hazard, topY, visualH);
    drawMagmaSparks(hazard, topY, visualH);

    ctx.restore();
    ctx.imageSmoothingEnabled = smoothing;
  }

  function drawProceduralMagmaFill(hazard, topY, visualH) {
    const g = ctx.createLinearGradient(0, topY, 0, topY + visualH);
    g.addColorStop(0, "#fff1a8");
    g.addColorStop(0.18, "#ff9f18");
    g.addColorStop(0.52, "#c83205");
    g.addColorStop(1, "#220604");
    ctx.fillStyle = g;
    ctx.fillRect(hazard.x, topY, hazard.w, visualH);

    ctx.globalCompositeOperation = "lighter";
    ctx.strokeStyle = "rgba(255, 228, 94, 0.72)";
    ctx.lineWidth = 2;
    for (let i = 0; i < Math.max(4, Math.floor(hazard.w / 38)); i++) {
      const startX = hazard.x + positiveModulo(i * 43 + hazard.anim * 22, hazard.w + 48) - 24;
      const baseY = topY + 7 + positiveModulo(i * 19, visualH - 8);
      ctx.beginPath();
      ctx.moveTo(startX, baseY);
      for (let dx = 0; dx <= 58; dx += 10) {
        ctx.lineTo(startX + dx, baseY + Math.sin(hazard.anim * 1.7 + dx * 0.15 + i) * 5);
      }
      ctx.stroke();
    }
    ctx.globalCompositeOperation = "source-over";
  }

  function drawMagmaSurface(hazard, topY, visualH) {
    const left = hazard.x;
    const right = hazard.x + hazard.w;
    const surfaceY = topY + 5;

    ctx.globalCompositeOperation = "lighter";
    ctx.lineWidth = 2.2;
    ctx.strokeStyle = "rgba(255, 242, 160, 0.86)";
    ctx.beginPath();
    for (let x = left; x <= right; x += 12) {
      const y = surfaceY
        + Math.sin(hazard.anim * 1.55 + x * 0.045) * 2.2
        + Math.sin(hazard.anim * 0.82 + x * 0.105) * 1.4;
      if (x === left) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();

    ctx.strokeStyle = "rgba(255, 116, 18, 0.72)";
    ctx.lineWidth = 4;
    ctx.beginPath();
    for (let x = left; x <= right; x += 18) {
      const y = topY + visualH * 0.42 + Math.sin(hazard.anim * 1.1 + x * 0.038) * 4;
      if (x === left) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.globalCompositeOperation = "source-over";
  }

  function drawMagmaCrust(hazard, topY, visualH) {
    const count = Math.max(3, Math.floor(hazard.w / 44));
    for (let i = 0; i < count; i++) {
      const seed = hazard.x * 0.013 + i * 2.317;
      const drift = hazard.anim * (1.1 + (i % 3) * 0.28);
      const cx = hazard.x + positiveModulo(i * 47 + Math.sin(seed) * 21 + drift, hazard.w + 58) - 29;
      const cy = topY + visualH * (0.30 + 0.42 * positiveModulo(Math.sin(seed * 1.7) * 0.5 + 0.5, 1))
        + Math.sin(hazard.anim * 1.4 + seed) * 2.4;
      const rx = 13 + positiveModulo(Math.sin(seed * 4.1) * 0.5 + 0.5, 1) * 18;
      const ry = 4 + positiveModulo(Math.cos(seed * 3.6) * 0.5 + 0.5, 1) * 4;

      ctx.fillStyle = "rgba(8, 4, 3, 0.62)";
      ctx.beginPath();
      ctx.ellipse(cx, cy, rx + 3, ry + 2, Math.sin(seed) * 0.18, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "rgba(245, 95, 16, 0.46)";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.ellipse(cx, cy, rx, ry, Math.sin(seed) * 0.18, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  function drawMagmaSparks(hazard, topY, visualH) {
    ctx.globalCompositeOperation = "lighter";
    for (let i = 0; i < Math.max(4, Math.floor(hazard.w / 34)); i++) {
      const seed = i * 17.31 + hazard.x * 0.021;
      const x = hazard.x + positiveModulo(i * 37 + hazard.anim * 30 + Math.sin(seed) * 11, hazard.w);
      const y = topY + 6 + positiveModulo(i * 23 + Math.cos(seed) * 9, Math.max(8, visualH - 12));
      const alpha = 0.28 + 0.26 * (Math.sin(hazard.anim * 2.7 + seed) * 0.5 + 0.5);
      ctx.fillStyle = `rgba(255, 246, 176, ${alpha.toFixed(3)})`;
      ctx.beginPath();
      ctx.ellipse(x, y, 7 + (i % 3) * 2, 1.6, Math.sin(seed), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalCompositeOperation = "source-over";
  }

  function positiveModulo(value, modulo) {
    return ((value % modulo) + modulo) % modulo;
  }

  function drawHazard(hazard) {
    if (hazard.type === "lava") {
      drawMagmaHazard(hazard);
      return;
    }
    if (RETRO_8BIT_MODE) {
      drawRetroHazard(hazard);
      return;
    }

    const count = Math.max(1, Math.floor(hazard.w / 18));
    for (let i = 0; i < count; i++) {
      const x0 = hazard.x + (i / count) * hazard.w;
      const x1 = hazard.x + ((i + 1) / count) * hazard.w;
      const mid = (x0 + x1) / 2;
      const spike = ctx.createLinearGradient(0, hazard.y, 0, hazard.y + hazard.h);
      spike.addColorStop(0, "#f8fafc");
      spike.addColorStop(0.5, "#9ca3af");
      spike.addColorStop(1, "#374151");
      ctx.fillStyle = spike;
      ctx.beginPath();
      ctx.moveTo(x0, hazard.y + hazard.h);
      ctx.lineTo(mid, hazard.y);
      ctx.lineTo(x1, hazard.y + hazard.h);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = "rgba(17,24,39,0.48)";
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  function drawFlag() {
    if (RETRO_8BIT_MODE) {
      drawRetroFlag();
      return;
    }
    if (!flag) return;
    ctx.fillStyle = "#d1d5db";
    ctx.fillRect(flag.x, flag.y, flag.w, flag.h);
    ctx.fillStyle = "#f8fafc";
    ctx.fillRect(flag.x + 1, flag.y, 2, flag.h);
    ctx.fillStyle = "#facc15";
    ctx.beginPath();
    ctx.arc(flag.x + flag.w / 2, flag.y, 8, 0, Math.PI * 2);
    ctx.fill();
    const g = ctx.createLinearGradient(flag.x, flag.y + 22, flag.x + 74, flag.y + 56);
    g.addColorStop(0, "#ef4444");
    g.addColorStop(1, "#f97316");
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(flag.x + flag.w, flag.y + 18);
    ctx.bezierCurveTo(flag.x + 44, flag.y + 8, flag.x + 52, flag.y + 42, flag.x + 84, flag.y + 30);
    ctx.lineTo(flag.x + flag.w, flag.y + 58);
    ctx.closePath();
    ctx.fill();
  }

  function drawCoin(c) {
    if (RETRO_8BIT_MODE) {
      drawRetroCoin(c);
      return;
    }
    const cx = c.x + c.w / 2;
    const cy = c.y + c.h / 2 + Math.sin(c.spin) * 3;
    if (sprites.userCoin) {
      const sw = sprites.userCoin.width || sprites.userCoin.naturalWidth;
      const sh = sprites.userCoin.height || sprites.userCoin.naturalHeight;
      const side = Math.min(sw, sh);
      const sx = (sw - side) / 2;
      const sy = (sh - side) / 2;
      const w = 30 * (0.35 + Math.abs(Math.cos(c.spin)) * 0.65);
      ctx.drawImage(sprites.userCoin, sx, sy, side, side, cx - w / 2, cy - 18, w, 36);
      return;
    }
    if (sprites.coin) {
      const w = 30 * (0.35 + Math.abs(Math.cos(c.spin)) * 0.65);
      ctx.drawImage(sprites.coin, cx - w / 2, cy - 18, w, 36);
      return;
    }
    const w = c.w * (0.28 + Math.abs(Math.cos(c.spin)) * 0.72);
    const g = ctx.createRadialGradient(cx - 4, cy - 7, 3, cx, cy, 18);
    g.addColorStop(0, "#fff7ad");
    g.addColorStop(0.45, "#facc15");
    g.addColorStop(1, "#a16207");
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.ellipse(cx, cy, w / 2, c.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#854d0e";
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  function drawItem(item) {
    if (RETRO_8BIT_MODE) {
      drawRetroItem(item);
      return;
    }
    if (item.collected) return;
    const bob = item.emerge > 0 ? Math.sin(item.walk * 2) * 1.5 : Math.sin(item.walk) * 2;
    const x = item.x;
    const y = item.y + bob;

    if (item.type === "grow" && sprites.userSuperMushroom) {
      ctx.save();
      ctx.imageSmoothingEnabled = false;
      const drawW = item.w + 10;
      const drawH = item.h + 8;
      ctx.drawImage(sprites.userSuperMushroom, x + item.w / 2 - drawW / 2, y + item.h - drawH, drawW, drawH);
      ctx.restore();
      return;
    }

    if (sprites.powerItem) {
      ctx.save();
      if (item.vx < 0) {
        ctx.translate(x + item.w, y - 6);
        ctx.scale(-1, 1);
        ctx.drawImage(sprites.powerItem, -5, 0, item.w + 10, item.h + 12);
      } else {
        ctx.drawImage(sprites.powerItem, x - 5, y - 6, item.w + 10, item.h + 12);
      }
      ctx.restore();
      return;
    }

    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = "rgba(0,0,0,0.24)";
    ctx.beginPath();
    ctx.ellipse(item.w / 2, item.h + 2, 15, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    const cap = ctx.createRadialGradient(10, 1, 2, item.w / 2, 10, 24);
    cap.addColorStop(0, "#ffe7b0");
    cap.addColorStop(0.28, "#f97316");
    cap.addColorStop(0.64, "#b91c1c");
    cap.addColorStop(1, "#5b1515");
    ctx.fillStyle = cap;
    ctx.beginPath();
    ctx.ellipse(item.w / 2, 13, 19, 13, 0, Math.PI, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "rgba(255,255,255,0.78)";
    ctx.beginPath();
    ctx.ellipse(11, 9, 4, 3, -0.4, 0, Math.PI * 2);
    ctx.ellipse(21, 7, 5, 3, 0.3, 0, Math.PI * 2);
    ctx.fill();

    const stem = ctx.createLinearGradient(0, 14, 0, item.h);
    stem.addColorStop(0, "#fff4d8");
    stem.addColorStop(1, "#c89b6d");
    ctx.fillStyle = stem;
    roundRect(8, 14, 16, 17, 7);
    ctx.fill();

    ctx.fillStyle = "#1f2937";
    ctx.beginPath();
    ctx.arc(13, 22, 2, 0, Math.PI * 2);
    ctx.arc(20, 22, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.26)";
    ctx.fillRect(10, 16, 7, 2);
    ctx.restore();
  }

  function drawEnemy(e) {
    const squash = !e.alive && e.squash > 0;
    if (!e.alive && !squash) return;
    const bob = Math.sin(e.walk) * 2;
    const spec = enemySpec(e.kind);
    const drawH = squash ? 18 : 44;
    const y = squash ? e.y + e.h - drawH + 8 : e.y + spec.drawOffsetY + bob;
    const x = e.x + enemyDrawOffsetX(e, spec);
    const sprite = sprites[enemySpriteKey(e)];
    if (sprite && !squash) {
      const flipSprite = spec.spriteFrames ? false : spec.spriteFacesRight ? e.vx < 0 : e.vx > 0;
      ctx.save();
      if (flipSprite) {
        ctx.translate(x + spec.drawW, y);
        ctx.scale(-1, 1);
        ctx.drawImage(sprite, 0, 0, spec.drawW, spec.drawH);
      } else {
        ctx.drawImage(sprite, x, y, spec.drawW, spec.drawH);
      }
      ctx.restore();
      return;
    }
    if (RETRO_8BIT_MODE) {
      drawRetroEnemy(e);
      return;
    }
    ctx.save();
    ctx.translate(0, bob);
    ctx.fillStyle = "rgba(0,0,0,0.26)";
    ctx.beginPath();
    ctx.ellipse(e.x + e.w / 2, e.y + e.h + 6, 20, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    const cap = ctx.createRadialGradient(e.x + 10, e.y + 2, 2, e.x + e.w / 2, e.y + 15, 32);
    cap.addColorStop(0, "#f1c9a1");
    cap.addColorStop(0.24, "#a45a2a");
    cap.addColorStop(0.66, "#60301f");
    cap.addColorStop(1, "#28140e");
    ctx.fillStyle = cap;
    ctx.beginPath();
    ctx.ellipse(e.x + e.w / 2, y + 17, 24, squash ? 8 : 18, 0, Math.PI, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "rgba(255,255,255,0.2)";
    ctx.beginPath();
    ctx.ellipse(e.x + 12, y + 8, 7, 3, -0.45, 0, Math.PI * 2);
    ctx.fill();

    const body = ctx.createLinearGradient(0, y + 16, 0, y + 44);
    body.addColorStop(0, "#d8a06c");
    body.addColorStop(0.55, "#9f6a42");
    body.addColorStop(1, "#4a2c1e");
    ctx.fillStyle = body;
    roundRect(e.x + 6, y + (squash ? 14 : 18), e.w - 12, squash ? 8 : 21, 9);
    ctx.fill();

    if (!squash) {
      ctx.fillStyle = "#f8fafc";
      ctx.beginPath();
      ctx.ellipse(e.x + 13, y + 25, 5, 6, -0.08, 0, Math.PI * 2);
      ctx.ellipse(e.x + e.w - 13, y + 25, 5, 6, 0.08, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#111827";
      ctx.beginPath();
      ctx.arc(e.x + 13 + (e.vx > 0 ? 1 : -1), y + 26, 2.4, 0, Math.PI * 2);
      ctx.arc(e.x + e.w - 13 + (e.vx > 0 ? 1 : -1), y + 26, 2.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#1f130f";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(e.x + 7, y + 17);
      ctx.lineTo(e.x + 16, y + 22);
      ctx.moveTo(e.x + e.w - 7, y + 17);
      ctx.lineTo(e.x + e.w - 16, y + 22);
      ctx.stroke();
      ctx.strokeStyle = "rgba(31, 19, 15, 0.85)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(e.x + e.w / 2, y + 31, 5, 0.15, Math.PI - 0.15);
      ctx.stroke();

      const footShift = Math.sin(e.walk * 3) * 2;
      ctx.fillStyle = "#1f130f";
      roundRect(e.x + 1, y + 37 + Math.max(0, footShift), 14, 7, 4);
      ctx.fill();
      roundRect(e.x + e.w - 15, y + 37 + Math.max(0, -footShift), 14, 7, 4);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawPlayer() {
    if (RETRO_8BIT_MODE) {
      drawRetroPlayer();
      return;
    }
    const flicker = player.invuln > 0 && Math.floor(player.invuln / 5) % 2 === 0;
    if (flicker) ctx.globalAlpha = 0.48;

    const drawX = player.x - 12;
    const drawY = player.y - 17;
    if (sprites.hero) {
      ctx.save();
      if (player.facing === -1) {
        ctx.translate(drawX + 56, drawY);
        ctx.scale(-1, 1);
        ctx.drawImage(sprites.hero, 0, 0, 56, 78);
      } else {
        ctx.drawImage(sprites.hero, drawX, drawY, 56, 78);
      }
      ctx.restore();
      ctx.globalAlpha = 1;
      return;
    }

    const step = player.onGround ? Math.sin(player.walk) : 0;
    ctx.save();
    if (player.facing === -1) {
      ctx.translate(player.x + player.w, player.y);
      ctx.scale(-1, 1);
    } else {
      ctx.translate(player.x, player.y);
    }

    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.beginPath();
    ctx.ellipse(player.w / 2, player.h + 4, 20, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    const shirt = ctx.createLinearGradient(0, 18, 0, 52);
    shirt.addColorStop(0, "#ef4444");
    shirt.addColorStop(1, "#991b1b");
    const denim = ctx.createLinearGradient(0, 24, 0, 58);
    denim.addColorStop(0, "#2563eb");
    denim.addColorStop(1, "#1e3a8a");
    const skin = ctx.createLinearGradient(0, 0, 0, 22);
    skin.addColorStop(0, "#f4c7a1");
    skin.addColorStop(1, "#b86d43");

    ctx.fillStyle = "#7f1d1d";
    ctx.beginPath();
    ctx.ellipse(16, 6, 18, 8, 0, Math.PI, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#dc2626";
    roundRect(0, 2, 30, 11, 7);
    ctx.fill();
    ctx.fillStyle = "#991b1b";
    ctx.beginPath();
    ctx.ellipse(25, 11, 12, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = skin;
    roundRect(6, 12, 23, 17, 8);
    ctx.fill();
    ctx.fillStyle = "#5b321d";
    ctx.beginPath();
    ctx.ellipse(23, 23, 8, 3, 0.1, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#111827";
    ctx.beginPath();
    ctx.arc(22, 17, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.3)";
    ctx.fillRect(10, 13, 7, 2);

    ctx.fillStyle = shirt;
    roundRect(3, 29, 27, 18, 7);
    ctx.fill();
    ctx.fillStyle = denim;
    roundRect(7, 32, 21, 23, 5);
    ctx.fill();
    ctx.fillStyle = "#facc15";
    ctx.beginPath();
    ctx.arc(12, 36, 2, 0, Math.PI * 2);
    ctx.arc(24, 36, 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = shirt;
    roundRect(-4, 31, 9, 15, 5);
    ctx.fill();
    roundRect(28, 31, 9, 15, 5);
    ctx.fill();
    ctx.fillStyle = skin;
    ctx.beginPath();
    ctx.arc(-2, 47, 5, 0, Math.PI * 2);
    ctx.arc(36, 47, 5, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#3f2218";
    const leftLegY = 51 + (player.onGround ? Math.max(0, step) * 3 : -2);
    const rightLegY = 51 + (player.onGround ? Math.max(0, -step) * 3 : 2);
    roundRect(8, leftLegY, 9, 11, 3);
    ctx.fill();
    roundRect(21, rightLegY, 9, 11, 3);
    ctx.fill();
    ctx.fillStyle = "#1f130f";
    roundRect(5, leftLegY + 9, 13, 5, 3);
    ctx.fill();
    roundRect(20, rightLegY + 9, 13, 5, 3);
    ctx.fill();

    ctx.restore();
    ctx.globalAlpha = 1;
  }

  function drawParticle(p) {
    if (RETRO_8BIT_MODE) {
      drawRetroParticle(p);
      return;
    }
    ctx.save();
    ctx.globalAlpha = clamp(p.life / 30, 0, 1);
    if (p.text) {
      ctx.fillStyle = p.color;
      ctx.font = "800 16px Segoe UI";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(p.text, p.x, p.y);
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function retroRect(x, y, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
  }

  function retroStrokeRect(x, y, w, h, color = "#000") {
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.strokeRect(Math.round(x) + 1, Math.round(y) + 1, Math.round(w) - 2, Math.round(h) - 2);
  }

  function currentTheme() {
    return LEVELS[currentLevelIndex]?.theme || "overworld";
  }

  function retroPalette() {
    const theme = currentTheme();
    if (theme === "sky") {
      return {
        sky: "#7b72f2",
        ground: "#d8a030",
        groundTop: "#ffe08a",
        groundDark: "#6b2a09",
        brick: "#b86828",
        brickLight: "#ffd878",
        stone: "#a86a20",
        stoneLight: "#f5c1aa",
        pipe: "#249040",
        pipeLight: "#8cff98",
        pipeDark: "#0d5420",
        question: "#ffd040",
        hazard: "#e85010",
        enemyBody: "#8c4c20",
        enemyTop: "#d09030",
        itemCap: "#e00000",
        itemLight: "#ffb080",
        flag: "#ffd040"
      };
    }
    if (theme === "underground") {
      return {
        sky: "#101040",
        ground: "#6050b8",
        groundTop: "#d0c8ff",
        groundDark: "#282060",
        brick: "#4030a0",
        brickLight: "#a898ff",
        stone: "#7060c8",
        stoneLight: "#d8d0ff",

        itemLight: "#d8ffff",
        flag: "#40d0ff"
      };
    }
    if (theme === "castle") {
      return {
        sky: "#201010",
        ground: "#505050",
        groundTop: "#c0c0c0",
        groundDark: "#181818",
        brick: "#704020",
        brickLight: "#d89040",

        pipe: "#804020",
        pipeLight: "#f0a050",

        question: "#d88820",
        hazard: "#f03000",
        enemyBody: "#681010",

      };

    return {
      sky: "#5c94fc",
      ground: "#c84c0c",

      enemyBody: "#8c4c20",
      enemyTop: "#c87838",
      itemCap: "#e00000",
      itemLight: "#ff8080",
      flag: "#e00000"
    };

  function drawRetroBackground() {
    const theme = currentTheme();
    const p = retroPalette();
    retroRect(0, 0, W, H, p.sky);

    if (theme === "sky") {
      const cloudOffset = -camX * 0.2;
      for (let i = 0; i < 18; i++) {
        const x = ((i * 235 + cloudOffset) % (worldWidth + 360)) - 160;
        const y = 42 + (i % 4) * 58;
        drawRetroSkyCloud(x, y, i % 3);
      }
      const mountainOffset = -camX * 0.12;
      for (let i = 0; i < 10; i++) {
        const x = ((i * 360 + mountainOffset) % (worldWidth + 520)) - 220;
        drawRetroSkyMountain(x, H - 72, 150 + (i % 3) * 28, 56 + (i % 2) * 18);
      }
      return;
    }

    if (theme === "underground") {
      const offset = -camX * 0.22;
      for (let x = -80 + (offset % 160); x < W + 160; x += 160) {
        retroRect(x, 56, 84, 18, "#302080");
        retroRect(x + 24, 34, 36, 22, "#7060c8");
        retroRect(x + 96, 126, 64, 18, "#302080");
        retroRect(x + 116, 104, 24, 22, "#7060c8");
      }
      for (let x = -40 + ((-camX * 0.5) % 80); x < W + 80; x += 80) {
        retroRect(x, H - 96, 40, 16, "#201858");
        retroRect(x + 40, H - 80, 40, 16, "#201858");
      }
      return;
    }

    if (theme === "castle") {
      const offset = -camX * 0.18;
      for (let x = -120 + (offset % 240); x < W + 240; x += 240) {
        drawBackgroundThwomp(x + 4, 52, 118, 0.42);
        drawBackgroundThwomp(x + 132, 118, 82, 0.28);
      }
      for (let x = -60 + ((-camX * 0.42) % 120); x < W + 120; x += 120) {
        retroRect(x, H - 112, 120, 32, "#180808");
        retroRect(x + 20, H - 128, 40, 16, "#301010");
        retroRect(x + 74, H - 124, 28, 12, "#301010");
      }
      return;
    }

    const cloudOffset = -camX * 0.25;
    for (let i = 0; i < 12; i++) {
      const x = ((i * 280 + cloudOffset) % (worldWidth + 320)) - 120;
      const y = 48 + (i % 3) * 34;
      retroRect(x, y + 12, 96, 16, "#ffffff");

      retroRect(x + 56, y + 4, 32, 12, "#ffffff");
      retroRect(x + 8, y + 28, 72, 8, "#d8f0ff");
    }

    const hillOffset = -camX * 0.45;
    for (let i = 0; i < 18; i++) {
      const x = ((i * 260 + hillOffset) % (worldWidth + 420)) - 180;
      const base = H - 76;
      retroRect(x + 40, base - 40, 120, 40, "#00a844");
      retroRect(x + 20, base - 24, 160, 24, "#008038");
      retroRect(x + 76, base - 28, 16, 8, "#7cff7c");

  function drawRetroSkyMountain(x, baseY, width, height) {
    const steps = 8;
    for (let i = 0; i < steps; i++) {
      const rowY = baseY - Math.round((i + 1) * height / steps);
      const rowW = Math.round(width * (i + 1) / steps);
      const rowX = x + Math.round((width - rowW) / 2);
      retroRect(rowX, rowY, rowW, Math.ceil(height / steps) + 1, i > steps - 3 ? "#b8c8ff" : "#6068d8");
    }
    retroRect(x + Math.round(width * 0.42), baseY - height + 10, Math.round(width * 0.16), 8, "#ffffff");

    const w = Math.round(s.w);
    const h = Math.round(s.h);
    const stemW = Math.max(34, Math.min(52, Math.round(w * 0.32)));
    const stemX = x + Math.round(w / 2 - stemW / 2);
    const stemH = Math.round(s.stemHeight || 150);
    retroRect(stemX, y + h, stemW, stemH, "#f6c8b8");
    retroRect(stemX + 7, y + h, 6, stemH, "#ffe4d8");
    retroRect(stemX + stemW - 8, y + h, 5, stemH, "#c68676");
    retroStrokeRect(stemX, y + h, stemW, stemH);

    retroRect(x, y - 5, w, h + 7, "#d8a030");
    retroRect(x + 6, y - 9, w - 12, 8, "#ffe08a");
    retroRect(x + 16, y + 5, 15, 11, "#8a2d0a");

      const aspect = (img.width || img.naturalWidth) / (img.height || img.naturalHeight);
      const w = Math.round(size * aspect);
      ctx.drawImage(img, Math.round(x), Math.round(y), w, size);

    retroRect(platform.x, platform.y + platform.h - 4, platform.w, 4, bottom);
    retroStrokeRect(platform.x, platform.y, platform.w, platform.h);

    retroRect(x + 36, y + h - 2, Math.round(w * 0.42), 15, "#d8f0ff");
    retroRect(x + Math.round(w * 0.48), y + h + 8, Math.round(w * 0.3), 6, "#90b8e8");
    retroRect(x + w - 34, y - 8, 17, 20, "#ef4444");
    retroRect(x + w - 21, y + 5, 25, 7, "#c02020");
    retroRect(x + 8, y + 9, 28, 7, "#f8fafc");
    retroRect(x, y + 11, 12, 4, "#d8f0ff");
    for (let px = x + 48; px < x + w - 54; px += 24) {
      retroRect(px, y + 9, 7, 6, "#38bdf8");

  function drawRetroSeesawRigging(seesaw) {
    const left = seesaw.left;
    const right = seesaw.right;
    const leftCx = Math.round(left.x + left.w / 2);
    const rightCx = Math.round(right.x + right.w / 2);
    const topY = Math.round(seesaw.topY);
    const rope = "#f6c1a8";
    const shadow = "#6b2a09";
    retroRect(leftCx - 2, topY, 4, Math.max(4, left.y - topY + 2), shadow);
    retroRect(leftCx - 1, topY, 2, Math.max(4, left.y - topY + 2), rope);
    retroRect(rightCx - 2, topY, 4, Math.max(4, right.y - topY + 2), shadow);
    retroRect(rightCx - 1, topY, 2, Math.max(4, right.y - topY + 2), rope);
    retroRect(leftCx, topY - 2, rightCx - leftCx, 5, rope);
    retroRect(leftCx, topY + 3, rightCx - leftCx, 3, shadow);
    for (const cx of [leftCx, rightCx]) {
      retroRect(cx - 12, topY - 12, 24, 24, "#a85c00");
      retroRect(cx - 7, topY - 7, 14, 14, "#d8a800");
      retroRect(cx - 2, topY - 2, 4, 4, "#111");
      retroStrokeRect(cx - 12, topY - 12, 24, 24);
    }

  function drawRetroSpring(spring) {
    const theme = currentTheme();
    const p = retroPalette();
    const compression = Math.round(spring.anim * 7);
    const topY = spring.y + compression;
    const springTop = theme === "underground" ? p.pipeLight : theme === "castle" ? p.itemCap : "#e00000";
    const coil = theme === "underground" ? "#d8ffff" : theme === "castle" ? "#ffd8a0" : "#ffffff";
    retroRect(spring.x, topY - 4, spring.w, 7, springTop);
    retroStrokeRect(spring.x, topY - 4, spring.w, 7);
    ctx.strokeStyle = coil;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(spring.x + 4, topY + 4);
    ctx.lineTo(spring.x + spring.w - 4, topY + 7);
    ctx.lineTo(spring.x + 4, topY + 11);
    ctx.lineTo(spring.x + spring.w - 4, topY + 15);
    ctx.stroke();
    retroRect(spring.x + 2, spring.y + spring.h - 4, spring.w - 4, 6, p.groundDark);
  }

  function drawRetroHazard(hazard) {
    const theme = currentTheme();
    const p = retroPalette();
    if (hazard.type === "lava") {
      const glow = theme === "underground" ? "#ff90ff" : "#ffd040";
      retroRect(hazard.x, hazard.y, hazard.w, hazard.h, p.hazard);
      retroRect(hazard.x, hazard.y, hazard.w, 6, glow);
      for (let x = hazard.x; x < hazard.x + hazard.w; x += 20) {
        retroRect(x + 4, hazard.y + 10 + Math.sin(hazard.anim + x * 0.03) * 3, 10, 4, glow);
      }
      retroStrokeRect(hazard.x, hazard.y, hazard.w, hazard.h);
      return;
    }

    const count = Math.max(1, Math.floor(hazard.w / 18));
    const spikeFill = theme === "underground" ? p.pipeLight : theme === "castle" ? p.stoneLight : "#ffffff";
    const spikeShade = theme === "underground" ? p.pipeDark : theme === "castle" ? "#404040" : "#c8c8c8";
    for (let i = 0; i < count; i++) {
      const x0 = hazard.x + i * 18;
      const mid = x0 + 9;
      ctx.fillStyle = spikeFill;
      ctx.beginPath();
      ctx.moveTo(x0, hazard.y + hazard.h);
      ctx.lineTo(mid, hazard.y);
      ctx.lineTo(x0 + 18, hazard.y + hazard.h);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = "#000";
      ctx.lineWidth = 2;
      ctx.stroke();
      retroRect(mid, hazard.y + 8, 3, hazard.h - 8, spikeShade);
