  function drawRetroCoin(c) {
    const theme = currentTheme();
    const p = retroPalette();
    const cx = Math.round(c.x + c.w / 2);
    const cy = Math.round(c.y + c.h / 2 + Math.sin(c.spin) * 3);
    const width = Math.max(6, Math.round(18 * (0.35 + Math.abs(Math.cos(c.spin)) * 0.65)));
    if (sprites.userCoin) {
      const img = sprites.userCoin;
      const sw = img.width || img.naturalWidth;
      const sh = img.height || img.naturalHeight;
      const side = Math.min(sw, sh);
      const sx = Math.round((sw - side) / 2);
      const sy = Math.round((sh - side) / 2);
      const smoothing = ctx.imageSmoothingEnabled;
      ctx.imageSmoothingEnabled = true;
      ctx.drawImage(img, sx, sy, side, side, cx - width / 2, cy - 14, width, 28);
      ctx.imageSmoothingEnabled = smoothing;
      return;
    }
    const rx = width / 2;
    const ry = 13;
    const fill = theme === "underground" ? "#f8d96a" : theme === "castle" ? p.itemCap : "#ffd040";
    const rim = theme === "underground" ? "#b8860b" : theme === "castle" ? "#a85c00" : "#b77900";
    const shadow = theme === "underground" ? "#7c5a00" : "#7c3f00";
    const shine = theme === "underground" ? "#ffffff" : theme === "castle" ? "#fff0a0" : "#fff088";

    ctx.save();
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    const coinGradient = ctx.createRadialGradient(cx - rx * 0.35, cy - ry * 0.45, 2, cx, cy, Math.max(ry, rx));
    coinGradient.addColorStop(0, shine);
    coinGradient.addColorStop(0.34, fill);
    coinGradient.addColorStop(0.72, "#f2a900");
    coinGradient.addColorStop(1, shadow);
    ctx.fillStyle = coinGradient;
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "#2b1600";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
    ctx.stroke();

    ctx.strokeStyle = rim;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(cx, cy, Math.max(2, rx - 3), ry - 4, 0, 0, Math.PI * 2);
    ctx.stroke();

    ctx.strokeStyle = shine;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(cx - rx * 0.12, cy - 1, Math.max(1.5, rx - 7), ry - 8, 0, 0, Math.PI * 2);
    ctx.stroke();

    ctx.strokeStyle = shadow;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx - Math.max(1, rx - 7), cy + 2);
    ctx.lineTo(cx + Math.max(1, rx - 7), cy + 2);
    ctx.stroke();

    ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
    ctx.beginPath();
    ctx.ellipse(cx - rx * 0.38, cy - ry * 0.42, Math.max(1.2, rx * 0.22), 2.4, -0.35, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawRetroItem(item) {
    if (item.collected) return;
    const theme = currentTheme();
    const p = retroPalette();
    const x = Math.round(item.x);
    const y = Math.round(item.y + (item.emerge > 0 ? 0 : Math.sin(item.walk) * 2));
    const type = item.type || "oneUp";

    if (type === "grow" && sprites.userSuperMushroom) {
      ctx.save();
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(sprites.userSuperMushroom, x - 2, y - 2, 36, 34);
      ctx.restore();
      return;
    }

    if (type === "grow") {
      retroRect(x + 2, y + 8, 28, 13, theme === "castle" ? "#f07020" : "#e00000");
      retroRect(x + 7, y + 1, 18, 9, theme === "underground" ? p.itemLight : "#ffb080");
      retroRect(x + 7, y + 20, 18, 12, "#ffd0a0");
      retroRect(x + 6, y + 12, 5, 5, "#ffffff");
      retroRect(x + 21, y + 11, 5, 5, "#ffffff");
      retroRect(x + 12, y + 25, 3, 3, "#000");
      retroRect(x + 19, y + 25, 3, 3, "#000");
    } else if (type === "fly") {
      const wing = theme === "castle" ? "#fff0a0" : "#d8ffff";
      retroRect(x + 3, y + 10, 9, 15, wing);
      retroRect(x + 20, y + 10, 9, 15, wing);
      retroRect(x + 7, y + 6, 18, 20, theme === "castle" ? "#ffd040" : "#40d0ff");
      retroRect(x + 11, y + 2, 10, 8, "#ffffff");
      retroRect(x + 12, y + 14, 8, 4, "#ffffff");
      retroRect(x + 14, y + 23, 4, 4, "#000");
    } else if (type === "tiny" || type === "micro") {
      const body = type === "micro" ? "#e879f9" : "#a78bfa";
      const light = type === "micro" ? "#f5d0fe" : "#ddd6fe";

    if (theme === "underground") {
      retroRect(x + 2, y + 9, e.w - 4, h - 9, p.enemyBody);

      retroRect(x + 11, y + 4, 4, 4, p.itemLight);

      retroRect(x + 2, y + 8, e.w - 4, h - 8, p.enemyBody);

  function drawBossFireball(fire) {
    const cx = Math.round(fire.x + fire.w / 2);
    const cy = Math.round(fire.y + fire.h / 2);
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(Math.atan2(fire.vy, fire.vx));
    ctx.fillStyle = "#f97316";
    ctx.beginPath();
    ctx.ellipse(0, 0, fire.w / 2, fire.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#facc15";
    ctx.beginPath();
    ctx.ellipse(Math.sin(fire.spin) * 3, 0, fire.w / 3, fire.h / 3, 0, 0, Math.PI * 2);
    ctx.fill();
    retroRect(-fire.w / 2 - 7, -3, 12, 6, "#ef4444");
    retroRect(-fire.w / 2 - 16, 2, 10, 5, "#fb923c");
    ctx.restore();
  }

  function drawPiranhaFireball(fire) {
    const cx = Math.round(fire.x + fire.w / 2);
    const cy = Math.round(fire.y + fire.h / 2);
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(fire.spin * (fire.vx < 0 ? -1 : 1));
    if (sprites.piranhaFireball) {
      ctx.imageSmoothingEnabled = false;
      const size = 28;
      if (fire.vx > 0) ctx.scale(-1, 1);
      ctx.drawImage(sprites.piranhaFireball, -size / 2, -size / 2, size, size);
      ctx.restore();
      return;
    }
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(1, -1, fire.w * 0.34, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#9a3412";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, fire.w * 0.42, -0.4, Math.PI * 1.42);
    ctx.stroke();
    retroRect(-fire.w / 2 - 7, 2, 8, 4, "#fb923c");
    ctx.restore();
  }

  function drawPlayerFireball(fire) {
    const cx = Math.round(fire.x + fire.w / 2);
    const cy = Math.round(fire.y + fire.h / 2);
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(fire.spin * (fire.vx < 0 ? -1 : 1));

      ctx.imageSmoothingEnabled = false;

      if (fire.vx < 0) {

      ctx.drawImage(sprites.userFireball, -size / 2, -size / 2, size, size);

    }
    ctx.fillStyle = "#f97316";
    ctx.beginPath();
    ctx.arc(0, 0, fire.w / 2 + 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#fff7ad";
    ctx.beginPath();
    ctx.arc(3, -3, fire.w / 3, 0, Math.PI * 2);
    ctx.fill();
    retroRect(-fire.w / 2 - 10, 1, 9, 5, "#ef4444");
    retroRect(-fire.w / 2 - 16, 5, 8, 5, "#fb923c");
    ctx.restore();
  }

  function drawBoss() {

    if (boss.facing === 1) {
      ctx.translate(Math.round(boss.x + boss.w), Math.round(boss.y));

      ctx.translate(Math.round(boss.x), Math.round(boss.y));

  function drawBossHp() {
    for (let i = 0; i < boss.maxHp; i++) {

    const label = `HP ${Math.max(0, boss.hp)}/${boss.maxHp}`;

  function yoshiRideMetrics() {
    const img = sprites.userYoshi;
    const aspect = img ? ((img.width || img.naturalWidth) / (img.height || img.naturalHeight)) : 48 / 28;
    const targetH = player.sizeMode === "big" ? 82 : player.sizeMode === "micro" ? 44 : player.sizeMode === "tiny" ? 56 : 74;
    const targetW = Math.round(targetH * aspect * 1.45);
    const dx = Math.round(player.x + player.w / 2 - targetW / 2);
    const dy = Math.round(player.y + player.h - targetH + 14);
    return {
      x: dx,
      y: dy,
      w: targetW,
      h: targetH,
      saddleX: Math.round(dx + targetW * (player.facing === -1 ? 0.62 : 0.38)),
      saddleY: Math.round(dy + targetH * 0.53)
    };
  }

  function drawRiderLegs(ride, front) {
    if (!player.companion) return;
    const direction = player.facing === -1 ? -1 : 1;
    const legY = Math.round(ride.saddleY + (front ? 4 : -1));
    const hipX = Math.round(ride.saddleX - direction * (front ? 2 : 10));
    const legColor = "#d82800";
    const shoeColor = "#1f130f";
    const skinColor = "#f8c088";
    if (front) {
      retroRect(hipX, legY, 9, 16, legColor);
      retroRect(hipX + direction * 4, legY + 12, 8, 6, skinColor);
      retroRect(hipX + direction * 8, legY + 17, 12, 6, shoeColor);
    } else {
      ctx.save();
      ctx.globalAlpha *= 0.82;
      retroRect(hipX, legY, 8, 14, "#a82000");
      retroRect(hipX + direction * 4, legY + 12, 10, 5, shoeColor);
      ctx.restore();
    }
  }

  function drawRetroCompanion(ride = yoshiRideMetrics()) {
    if (sprites.userYoshi) {
      const img = sprites.userYoshi;
      ctx.save();
      if (player.facing === -1) {
        ctx.translate(ride.x + ride.w, ride.y);
        ctx.scale(-1, 1);
        ctx.drawImage(img, 0, 0, ride.w, ride.h);
      } else {
        ctx.drawImage(img, ride.x, ride.y, ride.w, ride.h);
      }
      ctx.restore();
      return;
    }
    const x = Math.round(player.x + player.w / 2 - 24);
    const y = Math.round(player.y + player.h - 25);
    ctx.save();
    if (player.facing === -1) {
      ctx.translate(x + 48, y);
      ctx.scale(-1, 1);
    } else {
      ctx.translate(x, y);
    }
    retroRect(4, 8, 34, 16, "#22c55e");
    retroRect(24, 1, 18, 14, "#86efac");
    retroRect(38, 8, 7, 5, "#86efac");
    retroRect(29, 5, 4, 4, "#000");
    retroRect(10, 0, 5, 6, "#bbf7d0");
    retroRect(8, 20, 7, 7, "#166534");
    retroRect(29, 20, 7, 7, "#166534");
    retroRect(3, 12, 5, 4, "#bbf7d0");
    retroStrokeRect(4, 6, 38, 19);
    ctx.restore();
  }

  function drawRetroPlayer() {
    const flicker = player.invuln > 0 && Math.floor(player.invuln / 5) % 2 === 0;
    if (flicker) ctx.globalAlpha = 0.48;

    const ride = player.companion ? yoshiRideMetrics() : null;
    if (ride) drawRetroCompanion(ride);

    const superSprite = player.sizeMode === "big" && player.superTimer > 0 && !ride
      ? (player.firePoseTimer > 0 && sprites.userSuperMarioFire
        ? sprites.userSuperMarioFire
        : !player.onGround && sprites.userSuperMarioJump
          ? sprites.userSuperMarioJump
          : sprites.userSuperMario)
      : null;
    const marioSprite = superSprite || (!ride && !player.onGround && sprites.userMarioJump ? sprites.userMarioJump : sprites.userMario);
    if (marioSprite) {
      const spriteW = marioSprite.width || marioSprite.naturalWidth || 1;
      const spriteH = marioSprite.height || marioSprite.naturalHeight || 1;
      const superScale = Boolean(superSprite);
      const targetH = superScale
        ? Math.round(player.h * 1.24)
        : Math.round(player.h * (ride ? 0.98 : 1.12) * USER_MARIO_SPRITE_SCALE);
      const targetW = superScale
        ? Math.round(targetH * (spriteW / spriteH))
        : Math.round(player.w * (ride ? 1.42 : 1.72) * USER_MARIO_SPRITE_SCALE);
      const dx = ride
        ? Math.round(ride.saddleX - targetW * 0.48)
        : Math.round(player.x + player.w / 2 - targetW / 2);
      const dy = ride
        ? Math.round(ride.saddleY - targetH + 9)
        : Math.round(player.y + player.h - targetH);
      ctx.save();
      if (player.flyTimer > 0) {
        const wingLift = player.flyTimer % 16 < 8 ? 0 : 4;
        retroRect(dx - 6, dy + targetH * 0.42 - wingLift, 10, Math.round(targetH * 0.28), "#d8ffff");
        retroRect(dx + targetW - 4, dy + targetH * 0.42 - wingLift, 10, Math.round(targetH * 0.28), "#d8ffff");
        retroRect(dx - 3, dy + targetH * 0.48 - wingLift, 6, Math.round(targetH * 0.13), "#80d8ff");
        retroRect(dx + targetW - 3, dy + targetH * 0.48 - wingLift, 6, Math.round(targetH * 0.13), "#80d8ff");
      }
      if (ride) drawRiderLegs(ride, false);
      if (player.facing === -1) {
        ctx.translate(dx + targetW, dy);
        ctx.scale(-1, 1);
        ctx.drawImage(marioSprite, 0, 0, targetW, targetH);
      } else {
        ctx.drawImage(marioSprite, dx, dy, targetW, targetH);
      }
      ctx.restore();
      if (ride) drawRiderLegs(ride, true);
      ctx.globalAlpha = 1;
      return;
    }

    const scale = player.sizeMode === "big" ? 1.22 : 1;
    const riderLift = player.companion ? 11 : 0;
    const baseW = PLAYER_SMALL_W;
    const baseH = PLAYER_SMALL_H;
    const drawX = Math.round(player.x + (player.w - baseW * scale) / 2);
    const drawY = Math.round(player.y + player.h - baseH * scale - riderLift);

    ctx.save();
    if (player.facing === -1) {
      ctx.translate(Math.round(drawX + baseW * scale), drawY);
      ctx.scale(-scale, scale);
    } else {
      ctx.translate(drawX, drawY);
      ctx.scale(scale, scale);
    }

    const step = player.onGround ? Math.sin(player.walk) : 0;
    if (player.flyTimer > 0) {
      const wing = player.flyTimer % 16 < 8 ? 0 : 3;
      retroRect(-7, 24 - wing, 8, 18, "#d8ffff");
      retroRect(31, 24 - wing, 8, 18, "#d8ffff");
      retroRect(-4, 28 - wing, 5, 8, "#80d8ff");
      retroRect(31, 28 - wing, 5, 8, "#80d8ff");
    }
    retroRect(4, 0, 24, 7, "#d82800");
    retroRect(0, 7, 31, 5, "#d82800");
    retroRect(7, 12, 22, 14, "#f8c088");
    retroRect(4, 12, 7, 10, "#5c2408");
    retroRect(18, 20, 12, 4, "#5c2408");
    retroRect(23, 15, 4, 4, "#000");

    retroRect(4, 27, 24, 15, "#d82800");
    retroRect(8, 31, 16, 16, "#0040c0");
    retroRect(7, 34, 4, 4, "#ffd040");
    retroRect(22, 34, 4, 4, "#ffd040");
    retroRect(0, 28, 7, 13, "#d82800");
    retroRect(27, 28, 7, 13, "#d82800");
    retroRect(0, 40, 7, 5, "#f8c088");
    retroRect(27, 40, 7, 5, "#f8c088");

    const left = 46 + Math.max(0, step) * 3;
    const right = 46 + Math.max(0, -step) * 3;
    retroRect(7, left, 9, 10, "#5c2408");
    retroRect(20, right, 9, 10, "#5c2408");
    retroRect(4, left + 8, 13, 5, "#000");
    retroRect(19, right + 8, 13, 5, "#000");
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  function drawRetroParticle(p) {
    ctx.save();
    ctx.globalAlpha = clamp(p.life / 30, 0, 1);
    if (p.text) {
      ctx.fillStyle = p.color;
      ctx.font = "900 16px Courier New";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(p.text, Math.round(p.x), Math.round(p.y));
    } else {
      retroRect(p.x - 3, p.y - 3, 6, 6, p.color);
    }
    ctx.restore();
  }

  function drawVignette() {
    if (RETRO_8BIT_MODE) return;
    const g = ctx.createRadialGradient(W / 2, H * 0.48, H * 0.2, W / 2, H * 0.48, H * 0.82);
    g.addColorStop(0, "rgba(0,0,0,0)");
    g.addColorStop(1, "rgba(15,23,42,0.18)");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  function roundRect(x, y, w, h, r) {
    const radius = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + w - radius, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
    ctx.lineTo(x + w, y + h - radius);
    ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
    ctx.lineTo(x + radius, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
  }

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  window.addEventListener("keydown", (e) => {
    if (state === "ready") {
      if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "Space", "KeyX", "KeyF"].includes(e.code)) e.preventDefault();
      if (!e.repeat && (e.code === "ArrowUp" || e.code === "KeyW" ||
                         e.code === "ArrowLeft" || e.code === "KeyA")) {
        moveMenuSelection(-1);
        return;
      }
      if (!e.repeat && (e.code === "ArrowDown" || e.code === "KeyS" ||
                         e.code === "ArrowRight" || e.code === "KeyD")) {
        moveMenuSelection(1);
        return;
      }
      if (!e.repeat && (e.code === "Enter" || e.code === "Space")) {
        handleStartOrRestartInput();
        return;
      }
      return;
    }
    const handledConfirm = !e.repeat && handleStartOrRestartInput();
    if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "Space", "KeyX", "KeyF"].includes(e.code)) e.preventDefault();
    if (e.code === "ArrowLeft" || e.code === "KeyA") input.left = true;
    if (e.code === "ArrowRight" || e.code === "KeyD") input.right = true;
    if (e.code === "ArrowDown" || e.code === "KeyS") input.down = true;
    if (e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW") {
      input.jump = true;
      if (!e.repeat && state === "play") jumpQueued = true;
    }
    if (e.code === "KeyX" || e.code === "KeyF") {
      input.fire = true;
      if (!e.repeat && state === "play") fireQueued = true;
    }
    if (e.code === "KeyR" && !handledConfirm) prepareStartScreen();
  }, { passive: false });

  window.addEventListener("keyup", (e) => {
    if (e.code === "ArrowLeft" || e.code === "KeyA") input.left = false;
    if (e.code === "ArrowRight" || e.code === "KeyD") input.right = false;
    if (e.code === "ArrowDown" || e.code === "KeyS") input.down = false;
    if (e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW") input.jump = false;
    if (e.code === "KeyX" || e.code === "KeyF") input.fire = false;
  });

  window.addEventListener("pointerdown", () => {
    handleStartOrRestartInput();
  });

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  loadOptionalSprites();
  prepareStartScreen();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
