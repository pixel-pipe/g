<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8-Bit Plumber Rush</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    color-scheme: dark;
    --panel: rgba(15, 23, 42, 0.72);
    --line: rgba(255, 255, 255, 0.18);
    --text: #f8fafc;
    --accent: #facc15;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 18px;
    background: #1f1f1f;
    color: var(--text);
    font-family: "Courier New", monospace;
    user-select: none;
    overflow: hidden;
  }

  h1 {
    width: min(960px, calc(100vw - 28px));
    font-size: clamp(24px, 3.2vw, 42px);
    font-weight: 850;
    letter-spacing: 0;
    text-shadow: 0 2px 8px rgba(15, 23, 42, 0.45);
  }

  #hud {
    width: min(960px, calc(100vw - 28px));
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 8px;
    padding: 8px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel);
    box-shadow: 0 12px 40px rgba(15, 23, 42, 0.22);
    backdrop-filter: blur(8px);
  }

  .metric {
    min-height: 44px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 6px 10px;
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.08);
    overflow: hidden;
  }

  .label {
    color: rgba(248, 250, 252, 0.68);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .value {
    color: var(--text);
    font-size: 18px;
    font-weight: 850;
    line-height: 1.1;
    white-space: nowrap;
  }

  #wrap {
    position: relative;
    width: min(960px, calc(100vw - 28px));
    aspect-ratio: 16 / 9;
  }

  canvas {
    width: 100%;
    height: 100%;
    display: block;
    border: 4px solid #000;
    border-radius: 0;
    background: #5c94fc;
    box-shadow: 0 18px 0 #111;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  #overlay {
    position: absolute;
    inset: 0;
    z-index: 3;
    display: grid;
    place-items: center;
    pointer-events: none;
    opacity: 0;
    transform: translateY(8px);
    background: rgba(15, 23, 42, 0);
    transition: opacity 180ms ease, transform 180ms ease;
  }

  #overlay.show {
    opacity: 1;
    transform: translateY(0);
  }

  #overlay.game-over.show {
    background: rgba(15, 23, 42, 0.26);
  }

  #overlayContent {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  #gameOverSprite {
    width: clamp(112px, 21vh, 180px);
    height: auto;
    display: none;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    filter: drop-shadow(0 15px 0 rgba(0, 0, 0, 0.36));
    opacity: 0;
  }

  #overlay.game-over #gameOverSprite {
    display: block;
  }

  #overlay.game-over.show.from-bottom #gameOverSprite {
    animation:
      gameOverRiseIn 620ms cubic-bezier(0.2, 0.9, 0.22, 1) both,
      gameOverHover 1800ms ease-in-out 620ms infinite;
  }

  #overlay.game-over.show.from-top #gameOverSprite {
    animation:
      gameOverDropIn 620ms cubic-bezier(0.2, 0.9, 0.22, 1) both,
      gameOverHover 1800ms ease-in-out 620ms infinite;
  }

  @keyframes gameOverRiseIn {
    from { opacity: 0; transform: translateY(44px) scale(0.9); }
    72% { opacity: 1; transform: translateY(-7px) scale(1.04); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes gameOverDropIn {
    from { opacity: 0; transform: translateY(-44px) scale(0.9); }
    72% { opacity: 1; transform: translateY(7px) scale(1.04); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes gameOverHover {
    0%, 100% { opacity: 1; transform: translateY(0) scale(1); }
    50% { opacity: 1; transform: translateY(-9px) scale(1.01); }
  }

  #overlayText {
    max-width: min(720px, 88%);
    padding: 18px 26px;
    border: 1px solid rgba(255, 255, 255, 0.22);
    border-radius: 8px;
    background: rgba(15, 23, 42, 0.74);
    color: #fff;
    font-size: clamp(26px, 5vw, 56px);
    font-weight: 900;
    text-align: center;
    text-shadow: 0 3px 10px rgba(0, 0, 0, 0.38);
    box-shadow: 0 24px 70px rgba(15, 23, 42, 0.34);
  }

  #bossHint {
    position: absolute;
    top: 12px;
    left: 12px;
    right: 12px;
    z-index: 2;
    display: flex;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transform: translateY(-6px);
    transition: opacity 180ms ease, transform 180ms ease;
  }

  #bossHint.show {
    opacity: 1;
    transform: translateY(0);
  }

  #bossHintText {
    max-width: min(840px, 100%);
    padding: 10px 14px;
    border: 1px solid rgba(250, 204, 21, 0.42);
    border-radius: 6px;
    background: rgba(17, 24, 39, 0.86);
    color: #fde68a;
    font-size: clamp(12px, 1.8vw, 16px);
    font-weight: 850;
    line-height: 1.35;
    text-align: center;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    box-shadow: 0 14px 36px rgba(0, 0, 0, 0.28);
  }

  #powerHint {
    position: absolute;
    top: 12px;
    left: 12px;
    right: 12px;
    z-index: 2;
    display: flex;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transform: translateY(-6px);
    transition: opacity 180ms ease, transform 180ms ease;
  }

  #powerHint.show {
    opacity: 1;
    transform: translateY(0);
  }

  #powerHintText {
    max-width: min(680px, 100%);
    padding: 9px 14px;
    border: 1px solid rgba(251, 191, 36, 0.58);
    border-radius: 6px;
    background: rgba(83, 32, 5, 0.9);
    color: #fff7ad;
    font-size: clamp(13px, 2vw, 18px);
    font-weight: 900;
    line-height: 1.25;
    text-align: center;
    text-shadow: 0 2px 0 rgba(69, 26, 3, 0.8);
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.34);
  }

  #clearScreen {
    position: absolute;
    inset: 0;
    z-index: 4;
    display: grid;
    place-items: center;
    padding: 24px;
    background:
      linear-gradient(rgba(8, 13, 28, 0.82), rgba(8, 13, 28, 0.9)),
      radial-gradient(circle at 50% 20%, rgba(250, 204, 21, 0.2), transparent 42%);
    opacity: 0;
    pointer-events: none;
    transform: scale(1.02);
    transition: opacity 220ms ease, transform 220ms ease;
  }

  #clearScreen.show {
    opacity: 1;
    pointer-events: auto;
    transform: scale(1);
  }

  .clear-panel {
    width: min(640px, 100%);
    padding: 24px;
    border: 2px solid rgba(250, 204, 21, 0.62);
    border-radius: 8px;
    background: rgba(15, 23, 42, 0.92);
    box-shadow: 0 24px 70px rgba(0, 0, 0, 0.46);
  }

  .clear-title {
    color: #fde68a;
    font-size: clamp(30px, 5.4vw, 58px);
    font-weight: 950;
    line-height: 1;
    text-align: center;
    text-shadow: 0 3px 0 #7c2d12;
  }

  .clear-subtitle {
    margin-top: 8px;
    color: rgba(248, 250, 252, 0.72);
    font-size: 14px;
    font-weight: 800;
    text-align: center;
  }

  .clear-stats {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    margin-top: 22px;
  }

  .clear-stat {
    min-height: 84px;
    padding: 12px 8px;
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.08);
    text-align: center;
  }

  .clear-label {
    display: block;
    color: rgba(248, 250, 252, 0.66);
    font-size: 11px;
    font-weight: 850;
    text-transform: uppercase;
  }

  .clear-value {
    display: block;
    margin-top: 8px;
    color: #ffffff;
    font-size: clamp(20px, 3vw, 30px);
    font-weight: 950;
    line-height: 1.08;
  }

  .clear-note {
    margin-top: 18px;
    color: #fde68a;
    font-size: 13px;
    font-weight: 850;
    text-align: center;
  }

  @media (max-width: 720px) {
    body { justify-content: flex-start; overflow: auto; }
    #hud { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .metric:last-child { grid-column: span 2; }
    .clear-stats { grid-template-columns: 1fr; }
  }
</style>
</head>

  function normalizeGameConfig() {
    const embedded = window.PLUMBER_RUSH_STAGE_CONFIG || {};
    const stageIndexValue = embedded.stageIndex ?? QUERY_PARAMS.get("stageIndex");
    const stageValue = embedded.stage ?? QUERY_PARAMS.get("stage");
    const startLevelIndex = stageIndexValue !== null && stageIndexValue !== undefined
      ? parseLevelIndex(stageIndexValue)
      : parseStageNumber(stageValue);
    const singleStage = parseBoolean(embedded.singleStage ?? QUERY_PARAMS.get("single") ?? QUERY_PARAMS.get("singleStage"));
    return {
      startLevelIndex,
      singleStage,
      enemyType: String(embedded.enemyType || QUERY_PARAMS.get("enemyType") || QUERY_PARAMS.get("enemy") || ""),
      orchestratorUrl: String(embedded.orchestratorUrl || QUERY_PARAMS.get("orchestrator") || ""),
      nextStageUrl: String(embedded.nextStageUrl || QUERY_PARAMS.get("next") || "")
    };
  }

  function parseStageNumber(value) {
    if (value === null || value === undefined || value === "") return 0;
    const text = String(value).trim().toLowerCase();
    const worldIndex = LEVELS.findIndex(level =>
      level.world.toLowerCase() === text || level.name.toLowerCase() === text
    );
    if (worldIndex >= 0) return worldIndex;
    const numeric = Number.parseInt(text, 10);
    if (!Number.isFinite(numeric)) return 0;
    return clamp(numeric - 1, 0, LEVELS.length - 1);
  }

  function parseLevelIndex(value) {
    const numeric = Number.parseInt(value, 10);
    if (!Number.isFinite(numeric)) return 0;
    return clamp(numeric, 0, LEVELS.length - 1);
  }

  function parseBoolean(value) {
    if (value === true) return true;
    if (value === false || value === null || value === undefined) return false;
    return ["1", "true", "yes", "on", "single"].includes(String(value).trim().toLowerCase());
  }

  function applyDocumentConfig() {

    if (!level) return;
    if (GAME_CONFIG.singleStage) {
      document.title = `${level.world} ${level.name} - Plumber Rush`;
      titleEl.textContent = `${level.world} ${level.name}`;
      return;
    }
    if (GAME_CONFIG.startLevelIndex > 0) {

      titleEl.textContent = `8-Bit Plumber Rush - from ${level.world}`;
    }
  }

  function loadSprite(key, src, chroma) {
    const img = new Image();
    img.onload = () => {
      try {
        sprites[key] = chroma ? chromaKeyToCanvas(img) : img;
      } catch {
        sprites[key] = img;
      }
    };
    img.onerror = () => {};
    img.src = src;
  }

  function chromaKeyToCanvas(img) {
    const c = document.createElement("canvas");
    c.width = img.naturalWidth || img.width;
    c.height = img.naturalHeight || img.height;
    const g = c.getContext("2d");
    g.drawImage(img, 0, 0, c.width, c.height);
    const frame = g.getImageData(0, 0, c.width, c.height);
    const d = frame.data;
    const corners = [
      [0, 0],
      [c.width - 1, 0],
      [0, c.height - 1],
      [c.width - 1, c.height - 1]
    ].map(([x, y]) => {
      const index = (y * c.width + x) * 4;
      return [d[index], d[index + 1], d[index + 2]];
    });
    const key = corners.reduce((acc, color) => {
      acc[0] += color[0];
      acc[1] += color[1];
      acc[2] += color[2];
      return acc;
    }, [0, 0, 0]).map(value => value / corners.length);
    const keySpread = Math.max(key[0], key[1], key[2]) - Math.min(key[0], key[1], key[2]);
    const cornerThreshold = keySpread < 18 ? 54 : 44;
    for (let i = 0; i < d.length; i += 4) {
      const r = d[i], gr = d[i + 1], b = d[i + 2];
      const isGreenKey = gr > 150 && r < 90 && b < 120 && gr > r * 1.7 && gr > b * 1.7;
      const distanceToCorner = Math.hypot(r - key[0], gr - key[1], b - key[2]);
      if (isGreenKey || distanceToCorner < cornerThreshold) d[i + 3] = 0;
    }
    g.putImageData(frame, 0, 0);
    return c;
  }

  function ensureAudio() {
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if (!AudioContextClass) return false;

    if (!audioCtx) {
      audioCtx = new AudioContextClass();
      masterGain = audioCtx.createGain();
      sfxGain = audioCtx.createGain();
      musicGain = audioCtx.createGain();
      audioCompressor = audioCtx.createDynamicsCompressor();
      masterGain.gain.value = 0.78;
      sfxGain.gain.value = 0.9;
      musicGain.gain.value = 0.18;
      audioCompressor.threshold.value = -22;
      audioCompressor.knee.value = 18;
      audioCompressor.ratio.value = 4;
      audioCompressor.attack.value = 0.004;
      audioCompressor.release.value = 0.18;
      sfxGain.connect(masterGain);
      musicGain.connect(masterGain);
      masterGain.connect(audioCompressor);
      audioCompressor.connect(audioCtx.destination);
      nextMusicAt = audioCtx.currentTime + 0.15;
      setupCustomBgm();
    }

    if (audioCtx.state === "suspended") {
      audioCtx.resume()
        .then(() => { if (openingThemePending) startOpeningThemeIfNeeded(); })
        .catch(() => {});
    }
    return true;
  }

  function setupCustomBgm() {
    if (customBgmAttempted || !audioCtx || !musicGain) return;
    customBgmAttempted = true;
    customBgmAudio = new Audio();
    customBgmAudio.loop = true;
    customBgmAudio.preload = "auto";
    customBgmAudio.volume = 0.28;

    customBgmAudio.addEventListener("canplay", () => {
      customBgmReady = true;
      if (state === "play") playCustomBgm();
    });
    customBgmAudio.addEventListener("playing", () => {
      if (state !== "play") {
        stopStageBgm(true, true);
        return;
      }
      customBgmReady = true;
      customBgmBlocked = false;
      openingThemePending = false;
    });
    customBgmAudio.addEventListener("error", () => {
      if (customBgmCurrentSrc && !customBgmFailedSources.includes(customBgmCurrentSrc)) {
        customBgmFailedSources.push(customBgmCurrentSrc);
      }
      customBgmReady = false;
      customBgmBlocked = false;
      console.warn("BGM failed to load:", customBgmCurrentSrc);
    });
  }

  function playCustomBgm(forceAttempt = false) {
    setupCustomBgm();
    if (!customBgmAudio || !customBgmCurrentSrc) return false;
    if (state !== "play") return false;
    if (customBgmBlocked && !forceAttempt) return false;
    if (customBgmAudio.paused) {
      const playAttempt = customBgmAudio.play();
      if (playAttempt && typeof playAttempt.catch === "function") {
        playAttempt
          .then(() => {
            if (state !== "play") {
              stopStageBgm(true, true);
              return;
            }
            customBgmReady = true;
            customBgmBlocked = false;
            openingThemePending = false;
          })
          .catch((err) => {
            customBgmBlocked = true;
            console.warn("BGM playback was blocked until the next key, click, or controller input.", err);
          });
      }
    }
    return true;
  }

  function getStageBgmSource() {
    if (player.sizeMode === "big" && player.superTimer > 0) return LICENSED_AUDIO.superBonus;
    return QUERY_BGM_SOURCE || LICENSED_AUDIO.stage[currentLevelIndex] || LICENSED_AUDIO.stage[0];
  }

  function cueStageBgm(forceAttempt = false) {
    setupCustomBgm();
    if (!customBgmAudio) return false;
    const source = getStageBgmSource();
    if (!source || customBgmFailedSources.includes(source)) return false;

    if (customBgmCurrentSrc !== source) {
      customBgmCurrentSrc = source;
      customBgmReady = false;
      customBgmBlocked = false;
      customBgmAudio.loop = true;
      customBgmAudio.volume = 0.28;
      customBgmAudio.pause();
      customBgmAudio.currentTime = 0;
      customBgmAudio.src = source;
      customBgmAudio.load();
      return playCustomBgm(forceAttempt);
    }
    return playCustomBgm(forceAttempt);
  }

  function stopStageBgm(resetPosition = true, unloadSource = false) {
    if (customBgmAudio) {
      customBgmAudio.pause();
      if (resetPosition) {
        try {
          customBgmAudio.currentTime = 0;
        } catch (_) {
          // Some browsers can reject seeking before metadata is ready.
        }
      }
      if (unloadSource) {
        customBgmAudio.loop = false;
        customBgmAudio.removeAttribute("src");
        customBgmAudio.load();
        customBgmCurrentSrc = "";
        customBgmReady = false;
        customBgmBlocked = false;
      }
    }
    musicState = "";
    musicHoldUntil = 0;
  }

  function stopLicensedCues() {
    for (const audio of activeCueAudios) {

        // Ignore media elements that cannot seek yet.
      }
    }

  function trackSfxNode(node) {
    activeSfxNodes.add(node);
    node.addEventListener("ended", () => activeSfxNodes.delete(node), { once: true });

  function stopGeneratedSfx() {
    for (const node of activeSfxNodes) {
      try {

      } catch (_) {
        // Ignore nodes that already ended.
      }
    }
    activeSfxNodes.clear();
    stopAirplaneAudio();

  function createNoiseBuffer(duration = 1.2) {
    const length = Math.max(1, Math.floor(audioCtx.sampleRate * duration));
    const buffer = audioCtx.createBuffer(1, length, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < length; i++) {
      data[i] = Math.random() * 2 - 1;
    }
    return buffer;
  }

  function startAirplaneAudio() {
    if (airplaneAudio || !audioCtx || !sfxGain) return;
    const output = audioCtx.createGain();
    output.gain.value = 0.0001;
    const compressor = audioCtx.createDynamicsCompressor();
    compressor.threshold.value = -18;
    compressor.knee.value = 18;
    compressor.ratio.value = 7;
    compressor.attack.value = 0.006;
    compressor.release.value = 0.18;

    const wind = audioCtx.createBufferSource();
    wind.buffer = createNoiseBuffer(1.4);
    wind.loop = true;
    const windFilter = audioCtx.createBiquadFilter();
    windFilter.type = "bandpass";
    windFilter.frequency.value = 720;
    windFilter.Q.value = 0.7;
    const windGain = audioCtx.createGain();
    windGain.gain.value = 0.22;

    const prop = audioCtx.createOscillator();
    prop.type = "sawtooth";
    prop.frequency.value = 82;
    const propFilter = audioCtx.createBiquadFilter();
    propFilter.type = "lowpass";
    propFilter.frequency.value = 430;
    const propGain = audioCtx.createGain();
    propGain.gain.value = 0.16;

    const engine = audioCtx.createOscillator();
    engine.type = "triangle";
    engine.frequency.value = 46;
    const engineFilter = audioCtx.createBiquadFilter();
    engineFilter.type = "lowpass";
    engineFilter.frequency.value = 135;
    engineFilter.Q.value = 0.9;
    const engineGain = audioCtx.createGain();
    engineGain.gain.value = 0.18;

    const buzz = audioCtx.createOscillator();
    buzz.type = "square";
    buzz.frequency.value = 164;
    const buzzGain = audioCtx.createGain();
    buzzGain.gain.value = 0.025;

    wind.connect(windFilter);
    windFilter.connect(windGain);
    windGain.connect(output);
    prop.connect(propFilter);
    propFilter.connect(propGain);
    propGain.connect(output);
    engine.connect(engineFilter);
    engineFilter.connect(engineGain);
    engineGain.connect(output);
    buzz.connect(buzzGain);
    buzzGain.connect(output);
    let pan = null;
    if (audioCtx.createStereoPanner) {
      pan = audioCtx.createStereoPanner();
      output.connect(compressor);
      compressor.connect(pan);
      pan.connect(sfxGain || masterGain);
    } else {
      output.connect(compressor);
      compressor.connect(sfxGain || masterGain);
    }

    wind.start();
    prop.start();
    engine.start();
    buzz.start();
    airplaneAudio = { output, compressor, pan, wind, windFilter, prop, propFilter, engine, engineFilter, engineGain, buzz, buzzGain, propGain, windGain };
  }

  function stopAirplaneAudio() {
    if (!airplaneAudio) return;
    const nodes = airplaneAudio;
    const now = audioCtx ? audioCtx.currentTime : 0;
    try {
      nodes.output.gain.cancelScheduledValues(now);
      nodes.output.gain.setTargetAtTime(0.0001, now, 0.05);
    } catch (_) {}
    for (const node of [nodes.wind, nodes.prop, nodes.engine, nodes.buzz]) {
      try {
        node.stop(now + 0.12);
      } catch (_) {}
    }
    airplaneAudio = null;
  }

  function airplaneAudioIntensity() {
    if (state !== "play" || currentTheme() !== "sky" || !player.alive) return 0;
    let best = 0;
    let bestPan = 0;
    const playerCx = player.x + player.w / 2;
    const playerCy = player.y + player.h / 2;
    for (const platform of movingPlatforms) {
      if (platform.kind !== "airplane") continue;
      if (!platform.active) continue;
      const centerX = platform.x + platform.w / 2;
      const centerY = platform.y + platform.h / 2;
      const dx = centerX - playerCx;
      const dy = (centerY - playerCy) * AIRPLANE_SOUND_VERTICAL_WEIGHT;
      const distance = Math.hypot(dx, dy);
      const proximity = 1 - clamp(
        (distance - AIRPLANE_SOUND_FULL_RADIUS) / AIRPLANE_SOUND_FADE_RADIUS,
        0,
        1
      );
      const easedProximity = proximity * proximity;
      const riding = player.ridingPlatform === platform ? 1 : 0;
      const intensity = Math.max(easedProximity, riding);
      if (intensity > best) {
        best = intensity;
        bestPan = clamp((centerX - (camX + W / 2)) / (W * 0.55), -0.8, 0.8);
      }
    }
    airplaneAudioPan = bestPan;
    return clamp(best, 0, 1);
  }

  function updateAirplaneAudio() {
    if (!audioCtx || audioCtx.state !== "running") return;
    const intensity = airplaneAudioIntensity();
    if (intensity <= 0.035) {
      stopAirplaneAudio();
      return;
    }
    startAirplaneAudio();
    if (!airplaneAudio) return;
    const now = audioCtx.currentTime;
    const audibleIntensity = intensity * intensity;
    const gain = 0.006 + audibleIntensity * 0.062;
    airplaneAudio.output.gain.setTargetAtTime(gain, now, 0.08);
    airplaneAudio.windGain.gain.setTargetAtTime(0.26 + audibleIntensity * 0.42, now, 0.08);
    airplaneAudio.propGain.gain.setTargetAtTime(0.16 + audibleIntensity * 0.26, now, 0.08);
    airplaneAudio.engineGain.gain.setTargetAtTime(0.2 + audibleIntensity * 0.32, now, 0.08);
    airplaneAudio.buzzGain.gain.setTargetAtTime(0.025 + audibleIntensity * 0.075, now, 0.08);
    airplaneAudio.prop.frequency.setTargetAtTime(118 + intensity * 70, now, 0.06);
    airplaneAudio.engine.frequency.setTargetAtTime(42 + intensity * 28, now, 0.08);
    airplaneAudio.buzz.frequency.setTargetAtTime(236 + intensity * 126, now, 0.06);
    airplaneAudio.windFilter.frequency.setTargetAtTime(920 + intensity * 1180, now, 0.1);
    airplaneAudio.propFilter.frequency.setTargetAtTime(520 + intensity * 520, now, 0.08);
    airplaneAudio.engineFilter.frequency.setTargetAtTime(120 + intensity * 125, now, 0.12);
    if (airplaneAudio.pan) {
      airplaneAudio.pan.pan.setTargetAtTime(airplaneAudioPan, now, 0.1);
    }
  }

  function stopRestartAudio(unloadStageBgm = false) {
    stopLicensedCues();
    stopGeneratedSfx();
    stopStageBgm(true, unloadStageBgm);
  }

  function getStageClearMusicSource(levelIndex = currentLevelIndex) {
    if (levelIndex >= LEVELS.length - 1) return LICENSED_AUDIO.courseClear;
    return LICENSED_AUDIO.worldClear;
  }

  function playStageClearMusic(options = {}) {
    stopRestartAudio(true);
    openingThemePending = false;
    musicState = "stage-clear";
    musicHoldUntil = Number.POSITIVE_INFINITY;
    nextMusicAt = Number.POSITIVE_INFINITY;
    const source = getStageClearMusicSource();
    if (playLicensedCue(source, 0.94, options)) return true;
    playArpeggio([523.25, 659.25, 783.99, 1046.5, 1318.51, 1567.98], 0, 0.075, { duration: 0.19, gain: 0.095, type: "square" });
    playTone(261.63, 0.55, { type: "triangle", gain: 0.045, endFreq: 523.25 });
    return false;
  }

  function playFinalClearMusic() {
    stopRestartAudio(true);
    openingThemePending = false;
    musicState = "final-clear";
    musicHoldUntil = Number.POSITIVE_INFINITY;
    nextMusicAt = Number.POSITIVE_INFINITY;
    if (playLicensedCue(LICENSED_AUDIO.ending, 0.94)) return;
    playArpeggio([523.25, 659.25, 783.99, 1046.5, 1318.51, 1567.98, 2093], 0, 0.085, { duration: 0.22, gain: 0.105, type: "square" });
    playTone(261.63, 1.0, { delay: 0.08, type: "triangle", gain: 0.055, endFreq: 523.25 });
    playTone(392, 1.0, { delay: 0.1, type: "sine", gain: 0.035, endFreq: 783.99 });
  }

  function playLicensedCue(src, volume = 0.86, options = {}) {
    if (!src || !ensureAudio()) return null;
    const audio = new Audio(src);
    audio.preload = "auto";
    audio.volume = volume;
    let settled = false;
    activeCueAudios.push(audio);
    const settle = (callbackName) => {
      if (settled) return;
      settled = true;
      activeCueAudios = activeCueAudios.filter(item => item !== audio);
      if (typeof options[callbackName] === "function") options[callbackName](audio);
    };
    audio.addEventListener("ended", () => settle("onEnded"), { once: true });
    audio.addEventListener("error", () => settle("onError"), { once: true });
    audio.play().catch(() => {
      settle("onError");
    });
    return audio;
  }

  function playTone(freq, duration, options = {}) {
    if (!ensureAudio() || !masterGain) return;
    const now = audioCtx.currentTime;
    const start = now + (options.delay || 0);
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const pan = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;
    const target = options.endFreq || freq;
    osc.type = options.type || "sine";
    osc.frequency.setValueAtTime(freq, start);
    if (options.detune) osc.detune.setValueAtTime(options.detune, start);
    if (target !== freq) osc.frequency.exponentialRampToValueAtTime(Math.max(30, target), start + duration);

    gain.gain.setValueAtTime(0.0001, start);
    gain.gain.linearRampToValueAtTime(options.gain || 0.08, start + 0.012);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);

    osc.connect(gain);
    trackSfxNode(osc);
    if (pan) {
      pan.pan.setValueAtTime(options.pan || 0, start);
      gain.connect(pan);
      pan.connect(options.destination || sfxGain || masterGain);
    } else {
      gain.connect(options.destination || sfxGain || masterGain);
    }
    osc.start(start);
    osc.stop(start + duration + 0.04);
  }

  function playNoise(duration, options = {}) {
    if (!ensureAudio() || !masterGain) return;
    const sampleRate = audioCtx.sampleRate;
    const buffer = audioCtx.createBuffer(1, Math.max(1, Math.floor(sampleRate * duration)), sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      const t = i / data.length;
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, options.decay || 1.8);
    }

    const source = audioCtx.createBufferSource();
    const filter = audioCtx.createBiquadFilter();
    const gain = audioCtx.createGain();
    const pan = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;
    const start = audioCtx.currentTime + (options.delay || 0);
    source.buffer = buffer;
    filter.type = options.filterType || "bandpass";
    filter.frequency.setValueAtTime(options.filterFreq || 900, start);
    filter.Q.value = options.q || 0.8;
    gain.gain.setValueAtTime(options.gain || 0.05, start);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
    source.connect(filter);
    filter.connect(gain);
    if (pan) {
      pan.pan.setValueAtTime(options.pan || 0, start);
      gain.connect(pan);
      pan.connect(sfxGain || masterGain);
    } else {
      gain.connect(sfxGain || masterGain);
    }
    trackSfxNode(source);
    source.start(start);
  }

  function playArpeggio(notes, baseDelay = 0, step = 0.07, options = {}) {
    notes.forEach((note, index) => {
      playTone(note, options.duration || 0.13, {
        delay: baseDelay + index * step,
        type: options.type || "triangle",
        gain: options.gain || 0.07,
        endFreq: options.endFreq
      });
    });
  }

  function startOpeningThemeIfNeeded() {
    if (!openingThemePending || !ensureAudio()) return;
    if (cueStageBgm(true)) return;
    if (getStageBgmSource()) {
      musicHoldUntil = 0;
      return;
    }
    if (audioCtx.state !== "running") return;
    openingThemePending = false;
    playOpeningTheme();
  }

  function playOpeningTheme() {
    const notes = [
      523.25, 659.25, 783.99, 1046.5,
      987.77, 783.99, 659.25, 783.99,
      880, 1046.5, 1174.66, 1318.51,
      1046.5, 783.99, 880, 987.77
    ];
    notes.forEach((note, index) => {
      playTone(note, index % 4 === 3 ? 0.18 : 0.12, {
        delay: index * 0.105,
        type: index % 2 === 0 ? "square" : "triangle",
        gain: 0.07,
        destination: masterGain
      });
      if (index % 4 === 0) {
        playTone(note / 2, 0.16, {
          delay: index * 0.105,
          type: "sine",
          gain: 0.035,
          destination: masterGain
        });
      }
    });
    playNoise(0.08, { delay: 1.72, gain: 0.025, filterFreq: 1800 });
    musicHoldUntil = audioCtx.currentTime + 1.95;
    nextMusicAt = musicHoldUntil + 0.04;
    musicState = "";
  }

  function playSound(name) {
    switch (name) {
      case "jump":
        playTone(245, 0.13, { type: "square", gain: 0.09, endFreq: 510, pan: -0.08 });
        playTone(490, 0.11, { delay: 0.02, type: "triangle", gain: 0.045, endFreq: 760, pan: 0.08 });
        break;
      case "doubleJump":
        playTone(360, 0.2, { type: "square", gain: 0.1, endFreq: 980, pan: -0.16 });
        playTone(720, 0.16, { delay: 0.035, type: "triangle", gain: 0.065, endFreq: 1320, pan: 0.16 });
        playNoise(0.1, { gain: 0.052, filterFreq: 1850 });
        break;
      case "block":
        playTone(165, 0.09, { type: "square", gain: 0.105, endFreq: 95 });
        playTone(98, 0.12, { delay: 0.018, type: "sawtooth", gain: 0.048, endFreq: 70 });
        playNoise(0.09, { gain: 0.055, filterFreq: 520 });

      case "itemEmerge":
        playArpeggio([523.25, 659.25, 783.99, 1046.5], 0, 0.052, { duration: 0.13, gain: 0.085, type: "square" });

        break;
      case "powerup":

        playTone(196, 0.48, { type: "triangle", gain: 0.045, endFreq: 392 });
        break;
      case "fireball":

      case "fireHit":
        playTone(180, 0.12, { type: "sawtooth", gain: 0.095, endFreq: 76 });
        playTone(360, 0.08, { delay: 0.015, type: "square", gain: 0.045, endFreq: 130 });

      case "stomp":

        playNoise(0.09, { gain: 0.065, filterFreq: 300 });

      case "spring":
        playTone(300, 0.26, { type: "square", gain: 0.1, endFreq: 1160, pan: -0.12 });
        playTone(600, 0.22, { delay: 0.025, type: "triangle", gain: 0.065, endFreq: 1620, pan: 0.12 });
        playNoise(0.11, { gain: 0.04, filterFreq: 2200 });

      case "warpEnter":
        playTone(220, 0.18, { type: "square", gain: 0.08, endFreq: 92, pan: -0.08 });
        playTone(110, 0.32, { delay: 0.02, type: "triangle", gain: 0.052, endFreq: 55 });
        playNoise(0.24, { gain: 0.055, filterFreq: 520, filterType: "lowpass" });
        break;
      case "warpExit":
        playArpeggio([196, 246.94, 329.63, 493.88, 659.25, 987.77], 0, 0.045, { duration: 0.12, gain: 0.078, type: "triangle" });
        playTone(98, 0.34, { type: "sine", gain: 0.05, endFreq: 196 });
        playNoise(0.14, { gain: 0.035, filterFreq: 1600 });
        break;
      case "bossFire":
        playTone(120, 0.24, { type: "sawtooth", gain: 0.1, endFreq: 72, pan: 0.18 });
        playTone(260, 0.18, { delay: 0.02, type: "square", gain: 0.05, endFreq: 180, pan: -0.12 });
        playNoise(0.22, { gain: 0.07, filterFreq: 720, filterType: "lowpass" });
        break;
      case "death":
        playLicensedCue(LICENSED_AUDIO.playerDown, 0.9);
        playArpeggio([392, 329.63, 261.63, 196, 130.81, 98], 0, 0.095, { duration: 0.2, type: "sawtooth", gain: 0.09 });
        playNoise(0.28, { delay: 0.22, gain: 0.055, filterFreq: 180 });
        break;
      case "stageClear":
        playStageClearMusic();
        break;
      case "gameClear":
        playFinalClearMusic();
        break;
    }
  }

  function updateAudio() {
    if (!audioCtx || audioCtx.state !== "running" || !musicGain) return;
    updateAirplaneAudio();
    if (state !== "play") return;
    const stageBgmSource = getStageBgmSource();
    if (stageBgmSource && !customBgmFailedSources.includes(stageBgmSource)) {
      cueStageBgm();
      return;
    }

    const activeKey = `procedural-${currentLevelIndex}`;
    if (musicState !== activeKey) {
      musicState = activeKey;
      musicStep = 0;
      nextMusicAt = audioCtx.currentTime + 0.08;
    }
    if (audioCtx.currentTime < musicHoldUntil) return;
    if (nextMusicAt < musicHoldUntil) nextMusicAt = musicHoldUntil + 0.04;
    if (nextMusicAt < audioCtx.currentTime - 0.4) nextMusicAt = audioCtx.currentTime + 0.05;

    const patterns = [
      [261.63, 329.63, 392, 523.25, 392, 329.63, 293.66, 349.23],
      [220, 277.18, 329.63, 440, 329.63, 277.18, 246.94, 329.63],
      [196, 261.63, 311.13, 392, 311.13, 261.63, 233.08, 293.66]
    ];
    const pattern = patterns[currentLevelIndex % patterns.length];
    while (nextMusicAt < audioCtx.currentTime + 0.18) {
      const note = pattern[musicStep % pattern.length];
      const delay = Math.max(0, nextMusicAt - audioCtx.currentTime);
      playTone(note, 0.12, {
        delay,
        type: musicStep % 4 === 0 ? "square" : "triangle",
        gain: musicStep % 4 === 0 ? 0.05 : 0.038,
        pan: musicStep % 2 === 0 ? -0.16 : 0.16,
        destination: musicGain
      });
      if (musicStep % 2 === 1) {
        playTone(note * 1.5, 0.08, {
          delay: delay + 0.04,
          type: "triangle",
          gain: 0.018,
          pan: 0.22,
          destination: musicGain
        });
      }
      if (musicStep % 4 === 0) {
        playTone(note / 2, 0.16, {
          delay,
          type: "square",
          gain: 0.04,
          destination: musicGain
        });
      }
      if (musicStep % 4 === 2) {
        playNoise(0.045, { delay, gain: 0.012, filterFreq: 1000 });
      }
      musicStep++;
      nextMusicAt += 0.18;
    }
  }

  function addTile(x, y, type) {
    const tile = { x: x * TILE, y: y * TILE, w: TILE, h: TILE, type, used: false };
    solids.push(tile);
    return tile;
  }

  function addPlatform(x, y, width, type) {
    for (let i = 0; i < width; i++) {
      const tileType = type === "brick" && shouldPlaceHardBrickInRun(i, width) ? "hardBrick" : type;
      addTile(x + i, y, tileType);
    }
  }

  function addSkyPerch(x, y, width = 4, stemHeight = 4) {
    solids.push({
      x: x * TILE,
      y: y * TILE,
      w: width * TILE,
      h: 24,
      type: "skyPerch",
      used: false,
      stemHeight: stemHeight * TILE
    });
  }

  function shouldPlaceHardBrickInRun(index, width) {
    return width >= 5 && index > 0 && index < width - 1 && index % 3 === 2;
  }

  function addRareQuestionBlock(x, y) {
    addTile(x, y, "questionRare");
  }

  function addHiddenBlock(x, y, options = {}) {
    const config = typeof options === "string" ? { itemType: options } : options;
    const block = addTile(x, y, "hiddenBlock");
    block.hiddenRare = config.itemType !== "none";
    block.itemType = config.itemType ?? "grow";
    block.hiddenStep = config.itemType === "none";
    block.revealed = false;
    return block;
  }

  function addGroundSegment(x, width) {
    addPlatform(x, 13, width, "ground");
    addPlatform(x, 14, width, "deep");
  }

  function addPipe(x, y, height, secretWarp = "", orientation = "up") {
    const downFacing = orientation === "down";
    const startY = downFacing ? y - height + 1 : y;
    for (let row = 0; row < height; row++) {
      const tile = addTile(x, startY + row, "pipe");
      if (secretWarp) tile.secretWarp = secretWarp;
      if (downFacing) tile.pipeDirection = "down";
      if (secretWarp === "exit" && row === height - 1) tile.exitPipeMouth = true;
    }
    const topY = downFacing ? (y + 1) * TILE - 8 : y * TILE - 10;
    const top = { x: x * TILE - 8, y: topY, w: TILE + 16, h: 18, type: "pipeTop", used: false, pipeDirection: orientation };
    if (secretWarp) top.secretWarp = secretWarp;
    solids.push(top);
    return top;
  }

  function addPiranhaPlant(pipeX, pipeY, delay = 0, variant = "normal") {
    const total = PIRANHA_HIDDEN_FRAMES + PIRANHA_EMERGE_FRAMES + PIRANHA_EXPOSED_FRAMES + PIRANHA_RETRACT_FRAMES;
    piranhaPlants.push({
      centerX: pipeX * TILE + TILE / 2,
      mouthY: pipeY * TILE - 10,
      w: PIRANHA_DRAW_W,
      h: PIRANHA_DRAW_H,
      recess: 8,
      timer: positiveModulo(delay, total),
      total,
      variant,
      facing: -1,
      shotThisExposure: false
    });
  }

  function addSecretWarp(spec) {
    const top = addPipe(spec.x, spec.y, spec.height, "entry", spec.orientation || "up");
    const targetLevelIndex = spec.targetLevelIndex ??
      (spec.targetStage ? clamp(Math.floor(spec.targetStage) - 1, 0, LEVELS.length - 1) : null);
    if (targetLevelIndex !== null && targetLevelIndex !== undefined) {
      secretWarps.push({
        top,
        exitTop: null,
        targetLevelIndex,
        targetLabel: LEVELS[targetLevelIndex]?.world || `1-${targetLevelIndex + 1}`,
        entryDirection: spec.orientation || "up"
      });
      return;
    }
    const exitPipeY = spec.exitPipeY ?? 1;
    const exitPipeHeight = spec.exitPipeHeight ?? 2;
    const exitTop = addPipe(spec.exitPipeX ?? spec.exitX, exitPipeY, exitPipeHeight, "exit", spec.exitOrientation || "up");
    secretWarps.push({
      top,
      exitTop,
      exitBottomY: (exitPipeY + exitPipeHeight) * TILE,
      exitX: spec.exitX,
      exitGroundY: spec.exitGroundY,
      entryDirection: spec.orientation || "up"
    });
  }

  function coinRectForTile(x, y) {
    return { x: x * TILE + 10, y: y * TILE + 8, w: 20, h: 24 };
  }

  function coinHorizontalOverlap(coin, solid) {
    return coin.x + coin.w > solid.x + 2 && coin.x < solid.x + solid.w - 2;
  }

  function isCoinPlacementSolid(solid) {
    return solid.type !== "deep";
  }

  function resolveCoinSpawnPosition(x, y) {
    const coin = coinRectForTile(x, y);
    for (let guard = 0; guard < 10; guard++) {
      const blocker = solids.find(s =>
        isCoinPlacementSolid(s) &&
        (rectsOverlap(coin, s) ||
          (s.type !== "ground" &&
            coinHorizontalOverlap(coin, s) &&
            coin.y >= s.y + s.h - 2 &&
            coin.y <= s.y + s.h + 18))
      );
      if (!blocker) break;
      coin.y = Math.max(8, blocker.y - coin.h - 8);
    }
    return coin;
  }

  function addCoin(x, y) {
    const coin = resolveCoinSpawnPosition(x, y);
    coins.push({ ...coin, taken: false, spin: Math.random() * Math.PI * 2 });
  }

  function enemySpec(kind) {
    return ENEMY_SPECS[kind] || ENEMY_SPECS.default;
  }

  function enemySpriteKey(e) {
    const spec = enemySpec(e.kind);
    if (!spec.spriteFrames) return spec.spriteKey;
    const direction = e.vx > 0 ? "right" : "left";
    const frames = spec.spriteFrames[direction] || spec.spriteFrames.left || spec.spriteFrames.right;
    if (!frames) return spec.spriteKey;
    if (!e.onGround && frames.jump) return frames.jump;
    const walkFrames = frames.walk || [];
    return walkFrames.length ? walkFrames[Math.floor(e.walk * 5) % walkFrames.length] : frames.jump;
  }

  function enemyDrawOffsetX(e, spec) {
    if (spec.spriteFrames && e.vx > 0 && spec.drawOffsetXRight !== undefined) return spec.drawOffsetXRight;
    return spec.drawOffsetX;
  }

  function enemyStompTopBand(e) {
    return enemySpec(e.kind).stompTopBand ?? ENEMY_STOMP_TOP_BAND;
  }

  function enemySpeed(kind) {
    return enemySpec(kind).speed ?? 1.15;
  }

  function randomEnemyJumpTimer(spec) {
    const min = spec.jumpIntervalMin ?? 80;
    const max = spec.jumpIntervalMax ?? min;
    return min + Math.floor(Math.random() * (max - min + 1));
  }

  function addEnemy(x, y, patrol = 1, kind = "default") {
    const spec = enemySpec(kind);
    enemies.push({
      x: x * TILE, y: y * TILE, w: spec.w, h: spec.h,
      vx: -enemySpeed(kind) * patrol, vy: 0,
      alive: true, squash: 0, walk: Math.random() * 10, kind,
      onGround: false,
      jumpTimer: spec.jumpPower ? randomEnemyJumpTimer(spec) : 0
    });
  }

  function addHazard(x, groundY, width, type = "spike") {
    const h = type === "lava" ? 30 : 24;
    hazards.push({
      x: x * TILE,
      y: groundY * TILE - h,
      w: width * TILE,
      h,
      type,
      anim: Math.random() * Math.PI * 2
    });
  }

  function addSpring(x, y) {
    springs.push({
      x: x * TILE + 6,
      y: y * TILE + 17,
      w: TILE - 12,
      h: 18,
      cooldown: 0,
      anim: 0
    });
  }

  function addMovingPlatform(x, y, width, axis, range, speed) {
    movingPlatforms.push({
      x: x * TILE,
      y: y * TILE,
      baseX: x * TILE,
      baseY: y * TILE,
      prevX: x * TILE,
      prevY: y * TILE,
      w: width * TILE,
      h: 18,
      axis,
      range: range * TILE,
      speed,
      phase: Math.random() * Math.PI * 2,
      dx: 0,
      dy: 0,
      type: "moving"
    });
  }

  function addAirplanePlatform(x, y, width = 6, range = 40, speed = 1.05, spawnDelayFrames = 0) {
    const span = Math.max(width + 2, range) * TILE;
    const flightLeft = x * TILE;
    const delay = Math.max(0, Math.floor(spawnDelayFrames));
    const active = delay <= 0;
    const startX = active ? flightLeft : flightLeft - width * TILE - AIRPLANE_OFFSCREEN_RESET_MARGIN;
    movingPlatforms.push({
      x: startX,
      y: y * TILE,
      baseX: flightLeft,
      baseY: y * TILE,
      prevX: startX,
      prevY: y * TILE,
      w: width * TILE,
      h: AIRPLANE_PLATFORM_H,
      axis: "airplane",
      range: span,
      speed,
      phase: 0,
      bobPhase: spawnDelayFrames * 0.07,
      flightLeft,
      flightOffset: 0,
      dx: 0,
      dy: 0,
      type: "moving",
      kind: "airplane",
      active,
      rideTimer: 0,
      respawnTimer: delay
    });
  }

  function addSeesaw(leftX, rightX, y, width = SEESAW_DEFAULT_WIDTH, range = SEESAW_DEFAULT_RANGE, spring = SEESAW_DEFAULT_SPRING) {
    const group = {
      left: null,
      right: null,
      baseY: y * TILE,
      range: range * TILE,
      spring,
      friction: SEESAW_FRICTION,
      offset: 0,
      velocity: 0,
      topY: Math.max(42, y * TILE - 150)
    };
    group.left = createSeesawSide(group, -1, leftX, y, width);
    group.right = createSeesawSide(group, 1, rightX, y, width);
    seesaws.push(group);
    movingPlatforms.push(group.left, group.right);
  }

  function createSeesawSide(group, side, x, y, width) {
    return {
      x: x * TILE,
      y: y * TILE,
      baseX: x * TILE,
      baseY: y * TILE,
      prevX: x * TILE,
      prevY: y * TILE,
      w: width * TILE,
      h: 18,
      axis: "seesaw",
      range: group.range,
      speed: group.spring,
      phase: 0,
      dx: 0,
      dy: 0,
      type: "moving",
      kind: "seesaw",
      side,
      seesaw: group
    };
  }

  function addBoss(spec) {
    const w = 104;
    const h = 104;
    boss = {
      x: spec.x * TILE,
      y: spec.groundY * TILE - h,
      baseY: spec.groundY * TILE - h,
      w,
      h,
      hp: 4,
      maxHp: 4,
      alive: true,
      facing: -1,
      walk: 0,
      attackCooldown: BOSS_FIRE_INITIAL_COOLDOWN,
      aimX: player.x + player.w / 2,
      aimY: player.y + player.h / 2,
      hint: chooseBossHint(),
      hintShown: false,
      hurtTimer: 0,
      warnTimer: 0
    };
  }

  function randomChoice(list) {
    return list[Math.floor(Math.random() * list.length)];
  }

  function isRareItemType(type) {
    return RARE_ITEM_TYPES.includes(type);
  }

  function rollQuestionItemType(forceRare = false) {
    if (forceRare) return randomChoice(RARE_ITEM_TYPES);
    const roll = Math.random();
    if (roll < 0.82) return "oneUp";
    if (roll < 0.87) return "grow";
    if (roll < 0.91) return "tiny";
    if (roll < 0.94) return "micro";
    if (roll < 0.98) return "fly";
    return "companion";
  }

  function assignQuestionItems() {
    for (const s of solids) {
      if (s.type === "questionRare") {
        s.rareBox = true;
        s.itemType = rollQuestionItemType(true);
      } else if (s.type === "question") {
        s.itemType = rollQuestionItemType(false);
      }
    }
  }

  function assignHiddenRareBricks() {
    const candidates = solids.filter(s =>
      s.type === "brick" &&
      s.y <= 10 * TILE &&
      s.x > 5 * TILE &&
      s.x < worldWidth - 8 * TILE
    );
    const hiddenCount = Math.min(candidates.length, currentLevelIndex + 1);
    for (let i = candidates.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
    }
    for (let i = 0; i < hiddenCount; i++) {
      candidates[i].hiddenRare = true;
      candidates[i].itemType = rollQuestionItemType(true);
    }
  }

  function buildLevel() {
    const level = LEVELS[currentLevelIndex];
    solids = [];
    coins = [];
    items = [];
    enemies = [];
    hazards = [];
    boss = null;
    bossFireballs = [];
    playerFireballs = [];
    piranhaFireballs = [];
    secretWarps = [];
    secretWarpAnim = null;
    hideBossHint();
    springs = [];
    movingPlatforms = [];
    seesaws = [];
    piranhaPlants = [];
    particles = [];
    worldWidth = level.width * TILE;
    flag = { x: level.flag[0] * TILE + 16, y: level.flag[1] * TILE, w: 10, h: 6 * TILE };
    worldEl.textContent = level.world;

    for (const [x, width] of level.ground) addGroundSegment(x, width);
    for (const [x, y, width, type] of level.blocks) addPlatform(x, y, width, type);
    for (const [x, y] of level.rareQuestionBlocks || []) addRareQuestionBlock(x, y);
    for (const spec of level.hiddenBlocks || []) {
      if (Array.isArray(spec)) addHiddenBlock(...spec);
      else addHiddenBlock(spec.x, spec.y, spec);
    }
    for (const spec of level.skyPerches || []) addSkyPerch(...spec);
    for (const [x, y, height] of level.pipes) addPipe(x, y, height);
    for (const spec of level.secretWarps || []) addSecretWarp(spec);
    for (const [x, y, delay = 0, variant = "normal"] of level.piranhaPlants || []) addPiranhaPlant(x, y, delay, variant);
    assignQuestionItems();
    for (const [x, y, n] of level.coins) for (let i = 0; i < n; i++) addCoin(x + i, y);
    const levelEnemyType = GAME_CONFIG.singleStage && GAME_CONFIG.enemyType
      ? GAME_CONFIG.enemyType
      : level.enemyType || "default";
    for (const [x, y, patrol = 1, kind = levelEnemyType] of level.enemies) addEnemy(x, y, patrol, kind);
    for (const [x, y, width, type] of level.hazards) addHazard(x, y, width, type);
    if (level.boss) addBoss(level.boss);
    for (const [x, y] of level.springs) addSpring(x, y);
    for (const spec of level.movingPlatforms) addMovingPlatform(...spec);
    for (const spec of level.airplanes || []) addAirplanePlatform(...spec);
    for (const spec of level.seesaws || []) addSeesaw(...spec);
    notifyOrchestrator("stage-loaded");
  }

  function setMenuChrome(isMenu) {
    titleEl.style.display = isMenu ? "none" : "";
    hudEl.style.display = isMenu ? "none" : "";
  }

  function prepareStartScreen() {
    stopRestartAudio(true);
    setMenuChrome(true);
    score = 0;
    coinCount = 0;
    coinScore = 0;
    lives = 3;
    deathCount = 0;
    runStartedAt = 0;
    finalEndingStarted = false;
    currentLevelIndex = GAME_CONFIG.startLevelIndex;
    gameStarted = false;
    menuSelectionIndex = 0;
    openingThemePending = true;
    buildLevel();
    respawn();
    state = "ready";
    stateTimer = 0;
    retryAvailable = false;
    updateHud();
    hideClearScreen();
    hideOverlay();
    hidePowerHint();
  }

  function resetGame() {
    stopRestartAudio();
    setMenuChrome(false);
    score = 0;
    coinCount = 0;
    coinScore = 0;
    lives = 3;
    deathCount = 0;
    runStartedAt = performance.now();
    finalEndingStarted = false;
    currentLevelIndex = GAME_CONFIG.startLevelIndex;
    gameStarted = true;
    openingThemePending = true;
    buildLevel();
    respawn();
    state = "play";
    stateTimer = 0;
    retryAvailable = false;
    hideClearScreen();
    hideOverlay();
    hidePowerHint();
    updateHud();
    startOpeningThemeIfNeeded();
  }

  function restartCurrentStage() {
    stopRestartAudio();
    setMenuChrome(false);
    gameStarted = true;
    finalEndingStarted = false;
    openingThemePending = true;
    buildLevel();
    respawn();
    state = "play";
    stateTimer = 0;
    retryAvailable = false;
    hideClearScreen();
    hideOverlay();
    hidePowerHint();
    updateHud();
    startOpeningThemeIfNeeded();
  }

  function handleStartOrRestartInput() {
    ensureAudio();
    if (!gameStarted || state === "ready") {
      activateMenuSelection();
      return true;
    }
    if (state === "dead") {
      if (stateTimer > 0) return true;
      if (retryAvailable) restartCurrentStage();
      else prepareStartScreen();
      return true;
    }
    if (state === "win") {
      prepareStartScreen();
      return true;
    }
    startOpeningThemeIfNeeded();
    return false;
  }

  function moveMenuSelection(delta) {
    if (state !== "ready") return false;
    menuSelectionIndex = (menuSelectionIndex + delta + MENU_ITEMS.length) % MENU_ITEMS.length;
    playSound("block");
    return true;
  }

  function activateMenuSelection() {
    const item = MENU_ITEMS[menuSelectionIndex] || MENU_ITEMS[0];
    if (item.action === "start") {
      resetGame();
      return;
    }
    if (item.href) {
      window.location.href = item.href;
    }
  }

  function respawn() {
    Object.assign(player, {
      x: 80, y: 0, w: PLAYER_SMALL_W, h: PLAYER_SMALL_H, vx: 0, vy: 0,
      prevX: 80, prevY: 0,
      facing: 1, onGround: false, jumpsUsed: 0,
      invuln: 90, alive: true, walk: 0,
      sizeMode: "small", bossHp: PLAYER_BOSS_MAX_HP, superTimer: 0, flyTimer: 0, springSafeTimer: 0, companion: false,
      ridingPlatform: null, fireCooldown: 0, firePoseTimer: 0
    });
    fireQueued = false;
    camX = 0;
  }

  function maxPlayerJumps() {
    return player.flyTimer > 0 ? 3 : 2;
  }

  function resizePlayer(w, h) {
    const footY = player.y + player.h;
    const centerX = player.x + player.w / 2;
    player.w = w;
    player.h = h;
    player.x = clamp(centerX - w / 2, 0, worldWidth - w);
    player.y = footY - h;
  }

  function growPlayer() {
    if (player.sizeMode === "big") return;
    player.sizeMode = "big";
    resizePlayer(PLAYER_BIG_W, PLAYER_BIG_H);
  }

  function activateSuperMario() {
    growPlayer();
    player.superTimer = SUPER_MARIO_TIME;
    player.fireCooldown = 0;
    player.firePoseTimer = Math.max(player.firePoseTimer, FIRE_THROW_POSE_FRAMES);
    showPowerHint("SUPER MARIO: 〇ボタン / Xキー / Fキー でファイアボルト");
    if (state === "play") cueStageBgm(true);
  }

  function deactivateSuperMario(resumeMusic = true) {
    player.superTimer = 0;
    player.fireCooldown = 0;
    player.firePoseTimer = 0;
    fireQueued = false;
    hidePowerHint();
    if (player.sizeMode === "big") normalizePlayerSize();
    if (resumeMusic && state === "play") cueStageBgm(true);
  }

  function setTinyPlayer() {
    player.sizeMode = "tiny";
    resizePlayer(PLAYER_TINY_W, PLAYER_TINY_H);
  }

  function setMicroPlayer() {
    player.sizeMode = "micro";
    resizePlayer(PLAYER_MICRO_W, PLAYER_MICRO_H);
  }

  function normalizePlayerSize() {
    if (player.sizeMode === "small") return;
    player.sizeMode = "small";
    resizePlayer(PLAYER_SMALL_W, PLAYER_SMALL_H);
  }

  function updateHud() {
    scoreEl.textContent = score;
    coinsEl.textContent = coinCount;
    livesEl.textContent = lives;
    jumpsEl.textContent = Math.max(0, maxPlayerJumps() - player.jumpsUsed);
  }

  function showOverlay(text, color = "#fff", options = {}) {
    overlayText.textContent = text;
    overlayText.style.color = color;
    overlay.classList.remove("game-over", "from-bottom", "from-top");
    if (options.gameOver) {
      overlay.classList.add("game-over", options.fromTop ? "from-top" : "from-bottom");
    }
    overlay.classList.add("show");
  }

  function hideOverlay() {
    overlay.classList.remove("show");
    overlay.classList.remove("game-over", "from-bottom", "from-top");
  }

  function showClearScreen() {
    const elapsedMs = runStartedAt ? performance.now() - runStartedAt : 0;
    clearCoinPointsEl.textContent = `${coinScore} pts`;
    clearTimeEl.textContent = formatElapsedTime(elapsedMs);
    clearDeathsEl.textContent = String(deathCount);
    clearScreen.classList.add("show");
  }

  function showFinalClearResult() {
    if (finalEndingStarted || (state !== "finalCourseClear" && state !== "win")) return;
    finalEndingStarted = true;
    state = "win";
    stateTimer = 70;
    setMenuChrome(false);
    hideOverlay();
    showClearScreen();
    playFinalClearMusic();
    updateHud();
  }

  function advanceAfterStageClear() {
    if (state !== "levelClear") return;
    stopRestartAudio();
    currentLevelIndex += 1;
    buildLevel();
    respawn();
    state = "play";
    setMenuChrome(false);
    hideOverlay();
    updateHud();
  }

  function hideClearScreen() {
    clearScreen.classList.remove("show");
  }

  function formatElapsedTime(ms) {
    const totalSeconds = Math.max(0, Math.floor(ms / 1000));
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
  }

  function showBossHint(text) {
    bossHintText.textContent = text;
    bossHint.classList.add("show");
  }

  function hideBossHint() {
    bossHint.classList.remove("show");
  }

  function showPowerHint(text) {
    powerHintText.textContent = text;
    powerHintTimer = POWER_HINT_FRAMES;
    powerHint.classList.add("show");
  }

  function hidePowerHint() {
    powerHintTimer = 0;
    powerHint.classList.remove("show");
  }

  function updatePowerHint() {
    if (powerHintTimer <= 0) return;
    powerHintTimer -= 1;
    if (powerHintTimer <= 0) powerHint.classList.remove("show");
  }

  function chooseBossHint() {
    const choices = BOSS_HINTS.filter(hint => hint !== lastBossHint);
    lastBossHint = randomChoice(choices.length ? choices : BOSS_HINTS);
    return lastBossHint;
  }

  function rectsOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function playerFootOverlaps(target, sideForgiveness = 0) {
    const footLeft = player.x + player.w * 0.18;
    const footRight = player.x + player.w * 0.82;
    return footRight > target.x - sideForgiveness && footLeft < target.x + target.w + sideForgiveness;
  }

  function playerLandsOn(target, topBand, sideForgiveness = 0) {
    const prevBottom = player.prevY + player.h;
    const bottom = player.y + player.h;
    return player.vy >= 0 &&
      prevBottom <= target.y + topBand &&
      bottom >= target.y &&
      playerFootOverlaps(target, sideForgiveness);
  }

  function playerDropsIntoLava(hazard) {
    const prevBottom = player.prevY + player.h;
    const bottom = player.y + player.h;
    const prevCenterX = player.prevX + player.w / 2;
    const centerX = player.x + player.w / 2;
    const innerLeft = hazard.x + 4;
    const innerRight = hazard.x + hazard.w - 4;
    return player.vy >= 0 &&
      prevBottom <= hazard.y + 8 &&
      bottom >= hazard.y &&
      prevCenterX >= innerLeft &&
      prevCenterX <= innerRight &&
      centerX >= innerLeft &&
      centerX <= innerRight;
  }

  function collisionSolids(options = {}) {
    const includeHidden = Boolean(options.includeHidden);
    const baseSolids = includeHidden
      ? solids
      : solids.filter(s => s.type !== "hiddenBlock" || s.revealed);
    return movingPlatforms.length ? baseSolids.concat(movingPlatforms) : baseSolids;
  }

  function rectAt(obj, x = obj.x, y = obj.y) {
    return { x, y, w: obj.w, h: obj.h };
  }

  function overlapsStaticSolidAt(obj, x, y) {
    const rect = rectAt(obj, x, y);
    return solids.some(s => (s.type !== "hiddenBlock" || s.revealed) && rectsOverlap(rect, s));
  }

  function movePlayerAlongAxisSafely(axis, distance) {
    if (distance === 0) return;
    const steps = Math.max(1, Math.ceil(Math.abs(distance)));
    const step = distance / steps;
    for (let i = 0; i < steps; i++) {
      const nextX = axis === "x" ? clamp(player.x + step, 0, worldWidth - player.w) : player.x;
      const nextY = axis === "y" ? player.y + step : player.y;
      if (overlapsStaticSolidAt(player, nextX, nextY)) break;
      player.x = nextX;
      player.y = nextY;
    }
  }

  function movePlayerWithPlatform(platform) {
    if (!player.alive || player.ridingPlatform !== platform || !player.onGround) return;
    if (platform.kind === "airplane" && !platform.active) return;
    const feetY = player.y + player.h;
    const wasOnTop = Math.abs(feetY - platform.prevY) <= MOVING_PLATFORM_RIDE_TOLERANCE &&
      player.x + player.w > platform.prevX + MOVING_PLATFORM_EDGE_PADDING &&
      player.x < platform.prevX + platform.w - MOVING_PLATFORM_EDGE_PADDING;
    if (!wasOnTop) return;
    movePlayerAlongAxisSafely("x", platform.dx);
    movePlayerAlongAxisSafely("y", platform.dy);
  }

  function playerCanLandOnMovingPlatform(platform) {
    if (platform.kind === "airplane" && !platform.active) return false;
    const prevBottom = player.prevY + player.h;
    const bottom = player.y + player.h;
    return player.vy >= 0 &&
      prevBottom <= platform.y + MOVING_PLATFORM_LAND_TOLERANCE &&
      bottom >= platform.y &&
      playerFootOverlaps(platform, MOVING_PLATFORM_LAND_SIDE_FORGIVENESS);
  }

  function pollGamepad() {
    if (!navigator.getGamepads) return;

    const pads = navigator.getGamepads();
    let pad = null;
    for (const candidate of pads) {
      if (candidate && candidate.connected) {
        pad = candidate;
        break;
      }
    }

    if (!pad) {
      controller.left = false;
      controller.right = false;
      controller.up = false;
      controller.down = false;
      controller.jump = false;
      controller.fire = false;
      controller.prevJump = false;
      controller.prevFire = false;
      controller.prevRestart = false;
      controller.prevCancel = false;
      controller.prevMenuUp = false;
      controller.prevMenuDown = false;
      controller.prevMenuConfirm = false;
      controller.prevButtons = [];
      controller.connected = false;
      return;
    }

    controller.connected = true;
    const axisX = pad.axes[0] || 0;
    const axisY = pad.axes[1] || 0;
    controller.left = axisX < -GAMEPAD_DEADZONE || isPadButtonPressed(pad, 14);
    controller.right = axisX > GAMEPAD_DEADZONE || isPadButtonPressed(pad, 15);
    controller.up = axisY < -GAMEPAD_DEADZONE || isPadButtonPressed(pad, 12);
    controller.down = axisY > GAMEPAD_DEADZONE || isPadButtonPressed(pad, 13);

    const jumpPressed = isPadButtonPressed(pad, 0);
    const firePressed = isPadButtonPressed(pad, 1);
    controller.jump = jumpPressed;
    controller.fire = firePressed;
    const restartPressed = isPadButtonPressed(pad, 9);
    const cancelPressed = isPadButtonPressed(pad, 5) || isPadButtonPressed(pad, 7);
    const buttonStates = pad.buttons.map(button => Boolean(button && (button.pressed || button.value > 0.5)));
    const menuConfirmPressed = jumpPressed ||
      isPadButtonPressed(pad, 1) ||
      isPadButtonPressed(pad, 9);
    if (state === "ready") {
      if (cancelPressed && !controller.prevCancel) {
        try {
          window.top.location.href = "index.html";
        } catch (e) {
          window.location.href = "index.html";
        }
        return;
      }
      const menuUpInput = controller.up || controller.left;
      const menuDownInput = controller.down || controller.right;
      if (menuUpInput && !controller.prevMenuUp) moveMenuSelection(-1);
      if (menuDownInput && !controller.prevMenuDown) moveMenuSelection(1);
      if (menuConfirmPressed && !controller.prevMenuConfirm) handleStartOrRestartInput();
      controller.prevMenuUp = menuUpInput;
      controller.prevMenuDown = menuDownInput;
      controller.prevMenuConfirm = menuConfirmPressed;
      controller.prevJump = jumpPressed;
      controller.prevFire = firePressed;
      controller.prevRestart = restartPressed;
      controller.prevCancel = cancelPressed;
      controller.prevButtons = buttonStates;
      return;
    }
    controller.prevMenuUp = controller.up;
    controller.prevMenuDown = controller.down;
    controller.prevMenuConfirm = menuConfirmPressed;

    if (cancelPressed && !controller.prevCancel) {
      prepareStartScreen();
      controller.prevJump = jumpPressed;
      controller.prevFire = firePressed;
      controller.prevRestart = restartPressed;
      controller.prevCancel = cancelPressed;
      controller.prevButtons = buttonStates;
      return;
    }

    const anyButtonJustPressed = buttonStates.some((pressed, index) => pressed && !controller.prevButtons[index]);
    if (anyButtonJustPressed) {
      const handledConfirm = handleStartOrRestartInput();
      if (handledConfirm) {
        controller.prevJump = jumpPressed;
        controller.prevFire = firePressed;
        controller.prevRestart = restartPressed;
        controller.prevCancel = cancelPressed;
        controller.prevButtons = buttonStates;
        return;
      }
    }

    if (jumpPressed && !controller.prevJump) {
      if (state === "play") jumpQueued = true;
    }
    controller.prevJump = jumpPressed;

    if (firePressed && !controller.prevFire) {
      if (state === "play") fireQueued = true;
    }
    controller.prevFire = firePressed;

    if (restartPressed && !controller.prevRestart) {
      const handledRestart = handleStartOrRestartInput();
      if (!handledRestart) prepareStartScreen();
    }
    controller.prevRestart = restartPressed;
    controller.prevCancel = cancelPressed;
    controller.prevButtons = buttonStates;
  }

  function isPadButtonPressed(pad, index) {
    const button = pad.buttons[index];
    return Boolean(button && (button.pressed || button.value > 0.5));
  }

  function update() {
    pollGamepad();

    if (state === "ready") {
      updateParticles();
      updatePowerHint();
      updateCamera();
      return;
    }

    if (state === "play") {
      updateBrickBreakTimers();
      updateMovingPlatforms();
      if (secretWarpAnim) {
        updateSecretWarpAnimation();
      } else {
        updatePlayer();
        updateSecretWarps();
        updateEnemies();
        updatePiranhaPlants();
        updateBoss();
        updateBossFireballs();
        updatePiranhaFireballs();
        updatePlayerFireballs();
        updateCoins();
        updateItems();
        updateSprings();
        updateHazards();
        updateGoal();
      }
    } else {
      if (stateTimer > 0) stateTimer--;
      if (state === "levelClear" && stateTimer <= 0) {
        advanceAfterStageClear();
      }
      if (state === "finalCourseClear" && stateTimer <= 0) {
        showFinalClearResult();
      }
      if (state === "win" && stateTimer <= 0) {
        if (!clearScreen.classList.contains("show")) {
          showOverlay(GAME_CONFIG.singleStage ? "STAGE COMPLETE - PRESS ANY BUTTON" : "ALL CLEAR - PRESS ANY BUTTON", "#facc15");
        }
      }
    }
    updateParticles();
    updatePowerHint();
    updateCamera();
    updateAudio();
  }

  function updatePlayer() {
    player.prevX = player.x;
    player.prevY = player.y;

    let ax = 0;
    if (input.left || controller.left) { ax -= MOVE_ACC; player.facing = -1; }
    if (input.right || controller.right) { ax += MOVE_ACC; player.facing = 1; }
    player.vx += ax;
    if (ax === 0) player.vx *= FRICTION;
    if (Math.abs(player.vx) < 0.08) player.vx = 0;
    const maxSpeed = player.companion ? MAX_SPEED * 1.14 : MAX_SPEED;
    player.vx = clamp(player.vx, -maxSpeed, maxSpeed);

    if (jumpQueued) {
      if (player.onGround || player.jumpsUsed < maxPlayerJumps()) {
        const firstJump = player.onGround || player.jumpsUsed === 0;
        const jumpBoost = player.companion ? 1.08 : 1;
        player.vy = (firstJump ? -JUMP_POWER : -DOUBLE_JUMP_POWER) * jumpBoost;
        player.onGround = false;
        player.ridingPlatform = null;
        player.jumpsUsed = firstJump ? 1 : player.jumpsUsed + 1;
        playSound(firstJump ? "jump" : "doubleJump");
        spawnBurst(player.x + player.w / 2, player.y + player.h, firstJump ? "#d7c4a6" : "#f8fafc", firstJump ? 8 : 14);
      }
      jumpQueued = false;
    }

    player.vy += GRAVITY;
    if (player.flyTimer > 0) {
      player.flyTimer -= 1;
      if ((input.jump || controller.jump) && !player.onGround && player.alive) {
        player.vy -= 0.54;
        player.vy = Math.max(player.vy, -7.4);
        if (player.flyTimer % 8 === 0) {
          spawnBurst(player.x + player.w / 2, player.y + player.h * 0.55, "#bae6fd", 2);
        }
      }
    }
    player.vy = Math.min(player.vy, 18);

    player.x += player.vx;
    if (player.x < 0) { player.x = 0; player.vx = 0; }
    if (player.x + player.w > worldWidth) { player.x = worldWidth - player.w; player.vx = 0; }
    resolveCollision(player, "x");

    player.y += player.vy;
    player.onGround = false;
    player.ridingPlatform = null;
    resolveCollision(player, "y");

    if (player.onGround) player.jumpsUsed = 0;
    if (Math.abs(player.vx) > 0.4 && player.onGround) player.walk += 0.25;
    if (player.invuln > 0) player.invuln--;
    if (player.springSafeTimer > 0) player.springSafeTimer--;
    if (player.fireCooldown > 0) player.fireCooldown--;
    if (player.firePoseTimer > 0) player.firePoseTimer--;
    if (player.superTimer > 0) {
      player.superTimer--;
      if (player.superTimer <= 0) {
        if (player.sizeMode === "big") {
          deactivateSuperMario();
          spawnText(player.x + player.w / 2, player.y, "TIME UP", "#fde68a");
          spawnBurst(player.x + player.w / 2, player.y + player.h / 2, "#facc15", 14);
        } else {
          player.superTimer = 0;
          if (state === "play") cueStageBgm(true);
        }
      }
    }
    if (fireQueued) {
      shootPlayerFireball();
      fireQueued = false;
    }
    if (player.y > WORLD_H + 120) die();
    updateHud();
  }

  function resolveCollision(obj, axis) {
    const includeHidden = obj === player && axis === "y" && obj.vy < 0;
    for (const s of collisionSolids({ includeHidden })) {
      if (s.type === "moving" && s.kind === "airplane" && !s.active) continue;
      if (!rectsOverlap(obj, s)) continue;
      if (s.type === "hiddenBlock" && !s.revealed && (obj !== player || axis !== "y" || obj.vy >= 0)) continue;
      if (axis === "x") {
        if (obj === player && s.type === "moving") continue;
        if (obj.vx > 0) obj.x = s.x - obj.w;
        else if (obj.vx < 0) obj.x = s.x + s.w;
        obj.vx = 0;
      } else {
        if (obj === player && s.type === "moving" && !playerCanLandOnMovingPlatform(s)) continue;
        if (obj.vy > 0) {
          obj.y = s.y - obj.h;
          obj.vy = 0;
          obj.onGround = true;
          if (obj === player) obj.ridingPlatform = s.type === "moving" ? s : null;
        } else if (obj.vy < 0) {
          obj.y = s.y + s.h;
          obj.vy = 0;
          if (obj === player) bumpBlock(s);
        }
      }
    }
  }

  function bumpBlock(s) {
    if (s.type === "hiddenBlock" && !s.revealed && !s.used) {
      s.revealed = true;
      s.used = true;
      score += 200;
      if (s.itemType !== "none") spawnItemFromBlock(s);
      playSound("itemEmerge");
      spawnText(s.x + s.w / 2, s.y - 4, s.hiddenStep ? "STEP!" : "SECRET!", s.hiddenStep ? "#bbf7d0" : "#f0abfc");
      spawnBurst(s.x + s.w / 2, s.y, s.hiddenStep ? "#86efac" : "#f0abfc", s.hiddenStep ? 10 : 14);
      updateHud();
    } else if ((s.type === "question" || s.type === "questionRare") && !s.used) {
      s.used = true;
      score += 100;
      spawnItemFromBlock(s);
      playSound("itemEmerge");
      spawnText(s.x + s.w / 2, s.y - 4, s.rareBox ? "RARE!" : "ITEM!", s.rareBox ? "#f0abfc" : "#facc15");
      spawnBurst(s.x + s.w / 2, s.y, s.rareBox ? "#f0abfc" : "#facc15", s.rareBox ? 18 : 10);
      updateHud();
    } else if (s.type === "brick" && s.hiddenRare && !s.used) {
      s.used = true;
      score += 200;
      spawnItemFromBlock(s);
      playSound("itemEmerge");
      spawnText(s.x + s.w / 2, s.y - 4, "SECRET!", "#f0abfc");
      spawnBurst(s.x + s.w / 2, s.y, "#b45309", 8);
      spawnBurst(s.x + s.w / 2, s.y, "#f0abfc", 12);
      updateHud();
    } else if (s.type === "brick") {
      bumpBreakableBrick(s);
    } else if (s.type === "hardBrick") {
      playSound("block");
      spawnBurst(s.x + s.w / 2, s.y, "#64748b", 5);
    } else if (s.type === "question" || s.type === "questionRare" || s.type === "hiddenBlock") {
      playSound("block");
      spawnBurst(s.x + s.w / 2, s.y, "#b45309", 5);
    }
  }

  function bumpBreakableBrick(s) {
    if ((s.breakHits || 0) >= 1 && s.breakHitTimer > 0) {
      breakBrick(s);
      return;
    }
    resetOtherBrickBreakCombos(s);
    s.breakHits = 1;
    s.breakHitTimer = BRICK_BREAK_COMBO_FRAMES;
    playSound("block");
    spawnText(s.x + s.w / 2, s.y - 4, "CRACK", "#fdba74");
    spawnBurst(s.x + s.w / 2, s.y, "#b45309", 8);
  }

  function breakBrick(s) {
    solids = solids.filter(solid => solid !== s);
    score += 50;
    playSound("fireHit");
    spawnText(s.x + s.w / 2, s.y - 4, "BREAK", "#fdba74");
    spawnBurst(s.x + s.w / 2, s.y + s.h / 2, "#b45309", 18);
    spawnBurst(s.x + s.w / 2, s.y + s.h / 2, "#fdba74", 8);
    updateHud();
  }

  function resetOtherBrickBreakCombos(activeBrick) {
    for (const solid of solids) {
      if (solid === activeBrick || solid.type !== "brick") continue;
      solid.breakHits = 0;
      solid.breakHitTimer = 0;
    }
  }

  function spawnItemFromBlock(block) {
    const type = chooseQuestionItemType(block);
    const w = 32;
    const h = 32;
    items.push({
      type,
      rare: isRareItemType(type),
      x: block.x + block.w / 2 - w / 2,
      y: block.y - 5,
      startY: block.y - 5,
      targetY: block.y - h - 4,
      w,
      h,
      vx: 0,
      vy: 0,
      emerge: 28,
      emergeTotal: 28,
      active: false,
      collected: false,
      walk: 0
    });
  }

  function chooseQuestionItemType(block) {
    if (block.itemType) return block.itemType;
    return rollQuestionItemType(block.rareBox || block.hiddenRare);
  }

  function updateEnemies() {
    for (const e of enemies) {
      if (!e.alive) {
        if (e.squash > 0) e.squash--;
        continue;
      }
      const spec = enemySpec(e.kind);
      e.walk += 0.08;
      e.vy += GRAVITY;
      e.vy = Math.min(e.vy, 16);

      e.x += e.vx;
      for (const s of collisionSolids()) {
        if (!rectsOverlap(e, s)) continue;
        if (e.vx > 0) e.x = s.x - e.w;
        else e.x = s.x + s.w;
        e.vx = -e.vx;
        break;
      }

      e.y += e.vy;
      let onGround = false;
      for (const s of collisionSolids()) {
        if (!rectsOverlap(e, s)) continue;
        if (e.vy > 0) {
          e.y = s.y - e.h;
          e.vy = 0;
          onGround = true;
        } else if (e.vy < 0) {
          e.y = s.y + s.h;
          e.vy = 0;
        }
      }

      e.onGround = onGround;
      if (onGround && !hasGroundAhead(e)) e.vx = -e.vx;
      if (onGround && spec.jumpPower) {
        e.jumpTimer -= 1;
        if (e.jumpTimer <= 0) {
          e.vy = -spec.jumpPower;
          e.onGround = false;
          e.jumpTimer = randomEnemyJumpTimer(spec);
        }
      }
      if (e.y > WORLD_H + 120) e.alive = false;
    }
    resolveEnemyPlayerContacts();
  }

  function resolveEnemyPlayerContacts() {
    if (!player.alive) return;
    const contacts = enemies.filter(e => e.alive && rectsOverlap(player, e));
    if (!contacts.length) return;

    const stompedEnemies = contacts.filter(e =>
      playerLandsOn(e, enemyStompTopBand(e), ENEMY_STOMP_SIDE_FORGIVENESS)
    );

    if (!stompedEnemies.length) {
      hurtPlayer();
      return;
    }

    for (const e of stompedEnemies) stompEnemy(e);
    player.vy = -JUMP_POWER * 0.68;
    player.jumpsUsed = Math.min(player.jumpsUsed, 1);
    playSound("stomp");
    updateHud();
  }

  function stompEnemy(e) {
    e.alive = false;
    e.squash = 22;
    score += 150;
    spawnText(e.x + e.w / 2, e.y, "+150", "#fff");
    spawnBurst(e.x + e.w / 2, e.y + e.h / 2, "#7c2d12", 12);
  }

  function updateBrickBreakTimers() {
    for (const s of solids) {
      if (s.type !== "brick" || !s.breakHitTimer) continue;
      s.breakHitTimer -= 1;
      if (s.breakHitTimer <= 0) {
        s.breakHitTimer = 0;
        s.breakHits = 0;
      }
    }
  }

  function updatePiranhaPlants() {
    for (const plant of piranhaPlants) {
      plant.timer = (plant.timer + 1) % plant.total;
      plant.facing = player.x + player.w / 2 < plant.centerX ? -1 : 1;
      updateFirePiranhaAttack(plant);
      const hitbox = piranhaPlantHitbox(plant);
      if (!hitbox || !player.alive || player.springSafeTimer > 0 || !rectsOverlap(player, hitbox)) continue;
      hurtPlayer("piranha");
      break;
    }
  }

  function updateFirePiranhaAttack(plant) {
    if (plant.variant !== "fire") return;
    const pose = piranhaPlantPose(plant);
    if (pose !== "open" || piranhaPlantProgress(plant) < 0.98) {
      plant.shotThisExposure = false;
      return;
    }
    if (plant.shotThisExposure) return;

    const phase = positiveModulo(plant.timer, plant.total);
    const exposedStart = PIRANHA_HIDDEN_FRAMES + PIRANHA_EMERGE_FRAMES;
    if (phase - exposedStart < PIRANHA_OPEN_DELAY_FRAMES + 12) return;

    const playerCenterX = player.x + player.w / 2;
    const playerCenterY = player.y + player.h * 0.42;
    if (Math.hypot(playerCenterX - plant.centerX, playerCenterY - plant.mouthY) > PIRANHA_FIREBALL_RANGE) return;

    spitPiranhaFireball(plant, playerCenterX, playerCenterY);
    plant.shotThisExposure = true;
  }

  function spitPiranhaFireball(plant, targetX, targetY) {
    const progress = piranhaPlantProgress(plant);
    const top = piranhaPlantTop(plant, progress);
    const mouthX = plant.centerX + plant.facing * 21;
    const mouthY = top + 25;
    const size = PIRANHA_FIREBALL_SIZE;
    let dx = targetX - mouthX;
    let dy = targetY - mouthY;
    if (Math.abs(dx) + Math.abs(dy) < 1) dx = plant.facing;
    const angle = Math.atan2(dy, dx);
    piranhaFireballs.push({
      x: mouthX - size / 2,
      y: mouthY - size / 2,
      w: size,
      h: size,
      vx: Math.cos(angle) * PIRANHA_FIREBALL_SPEED,
      vy: Math.sin(angle) * PIRANHA_FIREBALL_SPEED,
      spin: Math.random() * Math.PI * 2,
      life: PIRANHA_FIREBALL_LIFE
    });
    playSound("bossFire");
    spawnBurst(mouthX, mouthY, "#fb923c", 7);
  }

  function piranhaPlantProgress(plant) {
    const phase = positiveModulo(plant.timer, plant.total);
    const emergeStart = PIRANHA_HIDDEN_FRAMES;
    const exposedStart = emergeStart + PIRANHA_EMERGE_FRAMES;
    const retractStart = exposedStart + PIRANHA_EXPOSED_FRAMES;

    if (phase < emergeStart) return 0;
    if (phase < exposedStart) {
      return smoothStep((phase - emergeStart) / PIRANHA_EMERGE_FRAMES);
    }
    if (phase < retractStart) return 1;
    return 1 - smoothStep((phase - retractStart) / PIRANHA_RETRACT_FRAMES);
  }

  function piranhaPlantPose(plant) {
    const phase = positiveModulo(plant.timer, plant.total);
    const exposedStart = PIRANHA_HIDDEN_FRAMES + PIRANHA_EMERGE_FRAMES;
    const retractStart = exposedStart + PIRANHA_EXPOSED_FRAMES;
    if (phase < exposedStart) return "closed";
    if (phase < retractStart) {
      return phase - exposedStart >= PIRANHA_OPEN_DELAY_FRAMES ? "open" : "closed";
    }
    return "closed";
  }

  function piranhaPlantTop(plant, progress = piranhaPlantProgress(plant)) {
    return plant.mouthY + plant.recess - plant.h * progress;
  }

  function piranhaPlantHitbox(plant) {
    const progress = piranhaPlantProgress(plant);
    if (progress < 0.2) return null;
    const top = piranhaPlantTop(plant, progress) + 5;
    const bottom = plant.mouthY + 1;
    const h = bottom - top;
    if (h <= 8) return null;
    const w = plant.w * 0.68;
    return {
      x: plant.centerX - w / 2,
      y: top,
      w,
      h
    };
  }

  function smoothStep(value) {
    const t = clamp(value, 0, 1);
    return t * t * (3 - 2 * t);
  }

  function hasGroundAhead(e) {
    const aheadX = e.vx > 0 ? e.x + e.w + 3 : e.x - 3;
    const footY = e.y + e.h + 6;
    return collisionSolids().some(s => aheadX >= s.x && aheadX <= s.x + s.w && footY >= s.y && footY <= s.y + s.h);
  }

  function playerCanShootFire() {
    return player.alive && player.sizeMode === "big" && player.superTimer > 0;
  }

  function shootPlayerFireball() {
    if (!playerCanShootFire() || player.fireCooldown > 0) return false;
    const dir = player.facing === -1 ? -1 : 1;
    const size = PLAYER_FIREBALL_SIZE;
    const muzzleX = dir > 0 ? player.x + player.w - 2 : player.x - size + 2;
    const muzzleY = player.y + player.h * 0.44 - size / 2;
    playerFireballs.push({
      x: muzzleX,
      y: muzzleY,
      prevX: muzzleX,
      prevY: muzzleY,
      w: size,
      h: size,
      vx: PLAYER_FIREBALL_SPEED * dir,
      vy: -1.8,
      life: PLAYER_FIREBALL_LIFE,
      spin: 0,
      active: true
    });
    player.fireCooldown = PLAYER_FIREBALL_COOLDOWN;
    player.firePoseTimer = FIRE_THROW_POSE_FRAMES;
    playSound("fireball");
    spawnBurst(muzzleX + size / 2, muzzleY + size / 2, "#fb923c", 7);
    return true;
  }

  function updateBoss() {
    if (!boss || !boss.alive) return;
    boss.walk += 0.05;
    boss.y = boss.baseY + Math.sin(boss.walk * 2.2) * 2;
    boss.facing = player.x + player.w / 2 < boss.x + boss.w / 2 ? -1 : 1;
    if (boss.hurtTimer > 0) boss.hurtTimer--;
    if (boss.warnTimer > 0) boss.warnTimer--;

    const targetX = player.x + player.w / 2;
    const targetY = player.y + player.h * 0.45;
    boss.aimX += (targetX - boss.aimX) * BOSS_AIM_LAG;
    boss.aimY += (targetY - boss.aimY) * BOSS_AIM_LAG;

    const distance = Math.hypot(targetX - (boss.x + boss.w / 2), targetY - (boss.y + boss.h / 2));
    if (!boss.hintShown && distance < BOSS_HINT_TRIGGER_RANGE) {
      boss.hintShown = true;
      showBossHint(boss.hint);
    }

    boss.attackCooldown--;
    if (distance < BOSS_FIRE_RANGE && boss.attackCooldown <= 0) {
      bossSpitFire();
      boss.attackCooldown = BOSS_FIRE_COOLDOWN_MIN +
        Math.floor(Math.random() * (BOSS_FIRE_COOLDOWN_MAX - BOSS_FIRE_COOLDOWN_MIN + 1));
    }

    if (!player.alive || !rectsOverlap(player, boss)) return;
    const stomp = playerLandsOn(boss, BOSS_STOMP_TOP_BAND, BOSS_STOMP_SIDE_FORGIVENESS);
    if (stomp) {
      player.y = boss.y - player.h;
      if (boss.hurtTimer <= 0) {
        damageBoss();
      } else {
        player.vy = -JUMP_POWER * 0.58;
        player.jumpsUsed = Math.min(player.jumpsUsed, 1);
      }
    } else {
      hurtPlayer("boss");
    }
  }

  function damageBoss() {
    boss.hp -= 1;
    boss.hurtTimer = 44;
    player.vy = -JUMP_POWER * 0.92;
    player.jumpsUsed = Math.min(player.jumpsUsed, 1);
    score += 500;
    playSound("stomp");
    spawnText(boss.x + boss.w / 2, boss.y + 4, boss.hp > 0 ? "HIT!" : "BOSS DOWN", boss.hp > 0 ? "#fff0a0" : "#facc15");
    spawnBurst(boss.x + boss.w / 2, boss.y + boss.h / 2, boss.hp > 0 ? "#f97316" : "#facc15", boss.hp > 0 ? 18 : 42);
    if (boss.hp <= 0) {
      boss.alive = false;
      score += 3000;
      bossFireballs = [];
      hideBossHint();
    }
    updateHud();
  }

  function bossSpitFire() {
    if (!boss || !boss.alive) return;
    const mouthX = boss.facing === -1 ? boss.x + boss.w * 0.16 : boss.x + boss.w * 0.84;
