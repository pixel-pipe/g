<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quit - Plumber Rush</title>
<style>
  * { box-sizing: border-box; }
  body {
    min-height: 100vh;
    margin: 0;
    display: grid;
    place-items: center;
    background: #050505;
    color: #fff;
    font-family: "Courier New", monospace;
  }
  main {
    width: min(720px, calc(100vw - 28px));
    border: 4px solid #421707;
    background: #c94e08;
    padding: 24px;
    box-shadow: 12px 12px 0 #111;
    text-align: center;
  }
  h1 {
    margin: 0 0 18px;
    color: #ffd0c0;
    font-size: clamp(40px, 9vw, 86px);
    line-height: 1;
    text-shadow: 8px 8px 0 #1b0d08;
  }
  p {
    font-size: 20px;
    line-height: 1.45;
  }
  a, button {
    display: inline-block;
    margin: 8px;
    border: 3px solid #111;
    background: #f97316;
    color: #fff;
    padding: 12px 16px;
    box-shadow: 5px 5px 0 #111;
    font: 900 18px "Courier New", monospace;
    text-decoration: none;
    cursor: pointer;
  }
</style>

<main>
  <h1>QUIT</h1>
  <p>The game is paused here. You can close this browser tab, or return to the main menu.</p>
  <button type="button" onclick="window.close()">CLOSE TAB</button>
